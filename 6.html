<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTRY SCANNER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04080d;
  --bg2: #080f18;
  --panel: #0a1520;
  --panel2: #0d1d2e;
  --border: #122840;
  --border2: #1a3550;
  --cyan: #00d4ff;
  --green: #00ff9d;
  --yellow: #ffd000;
  --orange: #ff7c2a;
  --red: #ff2d55;
  --purple: #b44aff;
  --text: #c0d8ee;
  --text2: #7a9ab8;
  --white: #eaf4ff;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Orbitron', monospace;
  --body: 'IBM Plex Sans KR', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden}

/* animated bg */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,212,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 90%, rgba(0,255,157,0.03) 0%, transparent 60%);
  pointer-events:none;z-index:0
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0
}

#root{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;border-bottom:1px solid var(--border2);
  background:linear-gradient(180deg,rgba(0,212,255,0.06) 0%,transparent 100%);
}
.hdr-title{display:flex;align-items:baseline;gap:14px}
.logo{font-family:var(--display);font-size:26px;font-weight:900;color:var(--cyan);
  letter-spacing:3px;text-shadow:0 0 30px rgba(0,212,255,0.6)}
.logo span{color:var(--green)}
.tagline{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:20px}
.status-pill{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;
  color:var(--text2);letter-spacing:1.5px;padding:5px 12px;border:1px solid var(--border2);border-radius:20px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text2)}
.dot.scanning{background:var(--yellow);box-shadow:0 0 8px var(--yellow);animation:blink 0.8s ease-in-out infinite}
.dot.done{background:var(--green);box-shadow:0 0 8px var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── CONTROLS ── */
.ctrl-bar{
  padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg2)
}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-label{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
select,input[type=range]{
  background:var(--panel);border:1px solid var(--border2);color:var(--white);
  font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:3px;outline:none;cursor:pointer
}
select:focus{border-color:var(--cyan)}
input[type=range]{padding:0;width:90px;accent-color:var(--cyan)}
.range-val{font-family:var(--mono);font-size:11px;color:var(--cyan);min-width:28px}

.btn{font-family:var(--display);font-size:10px;letter-spacing:2px;padding:8px 18px;
  border:1px solid;background:transparent;cursor:pointer;border-radius:3px;transition:all .15s;text-transform:uppercase}
.btn-scan{border-color:var(--cyan);color:var(--cyan)}
.btn-scan:hover{background:rgba(0,212,255,0.1);box-shadow:0 0 20px rgba(0,212,255,0.2)}
.btn-scan:disabled{opacity:.35;cursor:not-allowed}
.btn-stop{border-color:var(--red);color:var(--red)}
.btn-stop:hover{background:rgba(255,45,85,0.1)}

/* ── STATS ── */
.stats{display:flex;gap:0;border-bottom:1px solid var(--border)}
.stat{flex:1;padding:12px 20px;border-right:1px solid var(--border);position:relative;overflow:hidden}
.stat:last-child{border-right:none}
.stat::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent,var(--cyan));opacity:0.4}
.stat-l{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.stat-v{font-family:var(--display);font-size:20px;color:var(--accent,var(--cyan))}

/* ── PROGRESS ── */
.prog{display:none;padding:8px 28px;background:var(--bg2);border-bottom:1px solid var(--border)}
.prog.on{display:block}
.prog-info{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text2);margin-bottom:5px}
.prog-bg{height:2px;background:var(--border2);border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:1px;transition:width .3s;box-shadow:0 0 8px var(--cyan)}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}
.table-col{flex:1;overflow:auto}
.detail-col{width:360px;border-left:1px solid var(--border2);background:var(--panel);overflow-y:auto;display:none}
.detail-col.open{display:block}

/* ── FILTER TABS ── */
.ftabs{display:flex;gap:3px;padding:12px 20px 0;border-bottom:1px solid var(--border)}
.ftab{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:6px 14px;
  border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;
  border-radius:3px 3px 0 0;transition:all .12s;border-bottom:none;margin-bottom:-1px}
.ftab.on{border-color:var(--border2);color:var(--cyan);background:var(--panel);border-bottom:1px solid var(--panel)}

/* ── TABLE ── */
.tbl-wrap{padding:0 20px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;white-space:nowrap}
thead tr{border-bottom:1px solid var(--border2)}
th{padding:10px 10px;font-size:10px;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase;
  cursor:pointer;text-align:left;user-select:none}
th:hover,th.sorted{color:var(--cyan)}
tbody tr{border-bottom:1px solid rgba(26,53,80,0.8);cursor:pointer;transition:background .1s}
tbody tr:hover{background:rgba(0,212,255,0.04)}
tbody tr.selected{background:rgba(0,212,255,0.07)}
td{padding:10px 10px;color:var(--text)}

/* entry-ready glow row */
tbody tr.entry-ready{background:rgba(0,255,157,0.03)}
tbody tr.entry-ready:hover{background:rgba(0,255,157,0.06)}

.sym{font-size:13px;font-weight:600;color:var(--white);}
.sym sub{font-size:10px;color:var(--text2)}

.score-big{font-family:var(--display);font-size:16px;font-weight:700}
.score-bar-wrap{display:flex;align-items:center;gap:6px;min-width:100px}
.sbar-bg{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s}

.timing{display:flex;gap:3px}
.tc{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.tc.on{background:rgba(0,255,157,0.2);color:var(--green);border:1px solid rgba(0,255,157,0.5)}
.tc.off{background:rgba(14,32,48,0.8);color:var(--text2);border:1px solid var(--border2)}

.entry-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;letter-spacing:1px;
  padding:4px 10px;border-radius:3px;text-transform:uppercase;border:1px solid}
.eb-now{color:var(--green);border-color:rgba(0,255,157,0.5);background:rgba(0,255,157,0.12)}
.eb-watch{color:var(--yellow);border-color:rgba(255,208,0,0.5);background:rgba(255,208,0,0.1)}
.eb-wait{color:var(--text2);border-color:var(--border2);background:transparent}

.chg-p{color:var(--green)}
.chg-n{color:var(--red)}

.price-cell{color:var(--white);font-size:12px;font-weight:500}
.sl-cell{color:#ff6b7a;font-size:11px}
.tp-cell{color:#00e890;font-size:11px}
.rr-cell{font-family:var(--display);font-size:12px}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px}
.empty-big{font-family:var(--display);font-size:48px;color:var(--border2);letter-spacing:6px;margin-bottom:12px}
.empty-sub{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:2px;line-height:2}

/* ── DETAIL PANEL ── */
.dp{padding:20px}
.dp-sym{font-family:var(--display);font-size:22px;color:var(--white);letter-spacing:2px}
.dp-price{font-family:var(--mono);font-size:12px;color:var(--text);margin-top:4px}
.dp-score-row{display:flex;align-items:center;gap:16px;margin:16px 0}
.dp-score-circle{
  width:70px;height:70px;border-radius:50%;border:2px solid;
  display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0
}
.dp-score-n{font-family:var(--display);font-size:22px;line-height:1}
.dp-score-sub{font-family:var(--mono);font-size:8px;color:var(--text2)}

/* entry box */
.entry-box{
  border-radius:6px;padding:14px;margin:14px 0;
  border:1px solid;position:relative;overflow:hidden
}
.entry-box.now{border-color:rgba(0,255,157,0.4);background:rgba(0,255,157,0.06)}
.entry-box.watch{border-color:rgba(255,208,0,0.3);background:rgba(255,208,0,0.05)}
.entry-box.wait{border-color:var(--border2);background:var(--panel2)}
.entry-box-title{font-family:var(--display);font-size:10px;letter-spacing:2px;margin-bottom:10px}
.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.eg-item{background:var(--bg2);border-radius:4px;padding:8px 10px;border:1px solid var(--border)}
.eg-label{font-family:var(--mono);font-size:8px;color:var(--text2);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.eg-val{font-family:var(--display);font-size:13px}
.eg-sub{font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px}

/* timing section */
.dp-section{margin-top:16px}
.dp-sec-title{font-family:var(--mono);font-size:8px;color:var(--text2);letter-spacing:2px;
  text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:10px}
.timing-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;
  border-bottom:1px solid rgba(14,32,48,0.6)}
.timing-name{font-family:var(--mono);font-size:10px;color:var(--text)}
.timing-result{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px}
.t-on{color:var(--green)}
.t-off{color:var(--text2)}
.t-partial{color:var(--yellow)}

/* score breakdown bars */
.breakdown-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.bd-name{font-family:var(--mono);font-size:9px;color:var(--text2);width:80px;text-align:right;flex-shrink:0}
.bd-bar-bg{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.bd-bar-fill{height:100%;border-radius:2px}
.bd-val{font-family:var(--mono);font-size:9px;color:var(--text);width:32px;text-align:right;flex-shrink:0}

/* rr badge */
.rr-badge{display:inline-block;font-family:var(--display);font-size:13px;padding:4px 12px;
  border-radius:4px;border:1px solid}
.rr-good{color:#00ffaa;border-color:rgba(0,255,170,0.5);background:rgba(0,255,170,0.1)}
.rr-ok{color:#ffd600;border-color:rgba(255,214,0,0.4);background:rgba(255,214,0,0.08)}
.rr-bad{color:#ff5577;border-color:rgba(255,85,119,0.4);background:rgba(255,85,119,0.08)}

/* warning */
.warn-box{margin-top:12px;padding:10px 12px;background:rgba(255,124,42,0.08);border:1px solid rgba(255,124,42,0.25);border-radius:4px;
  font-family:var(--mono);font-size:9px;color:var(--orange);line-height:1.7}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div id="root">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">
    <div class="logo">ENTRY<span>SCAN</span></div>
    <div class="tagline">Binance USDT Perp · 매집 + 진입 타이밍 통합 분석</div>
  </div>
  <div class="hdr-right">
    <div class="status-pill">
      <div class="dot" id="statusDot"></div>
      <span id="statusTxt">READY</span>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--text2)" id="updateTime">--</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="ctrl-bar">
  <div class="ctrl-group">
    <span class="ctrl-label">시간봉</span>
    <select id="tfSel">
      <option value="15m">15분</option>
      <option value="1h">1시간</option>
      <option value="4h" selected>4시간</option>
      <option value="1d">일봉</option>
    </select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">매집점수</span>
    <input type="range" id="minAccum" min="40" max="80" step="5" value="55">
    <span class="range-val" id="minAccumVal">55+</span>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">타이밍</span>
    <select id="minTiming">
      <option value="2">2개 이상</option>
      <option value="3" selected>3개 이상</option>
      <option value="4">4개 전부</option>
    </select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">최소RR</span>
    <input type="range" id="minRR" min="1" max="4" step="0.5" value="2">
    <span class="range-val" id="minRRVal">2.0</span>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">거래량필터</span>
    <select id="minVol">
      <option value="5000000">500만+</option>
      <option value="10000000" selected>1000만+</option>
      <option value="50000000">5000만+</option>
    </select>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">심볼수</span>
    <select id="maxSym">
      <option value="50">50</option>
      <option value="100" selected>100</option>
      <option value="200">200</option>
    </select>
  </div>
  <button class="btn btn-scan" id="scanBtn" onclick="startScan()">▶ SCAN</button>
  <button class="btn btn-stop" id="stopBtn" onclick="stopScan()" style="display:none">■ STOP</button>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat" style="--accent:var(--cyan)">
    <div class="stat-l">스캔</div>
    <div class="stat-v" id="sScanned">0</div>
  </div>
  <div class="stat" style="--accent:var(--green)">
    <div class="stat-l">🚀 즉시진입</div>
    <div class="stat-v" id="sNow">0</div>
  </div>
  <div class="stat" style="--accent:var(--yellow)">
    <div class="stat-l">👀 관찰중</div>
    <div class="stat-v" id="sWatch">0</div>
  </div>
  <div class="stat" style="--accent:var(--orange)">
    <div class="stat-l">최고RR</div>
    <div class="stat-v" id="sBestRR">-</div>
  </div>
  <div class="stat" style="--accent:var(--purple)">
    <div class="stat-l">평균매집점수</div>
    <div class="stat-v" id="sAvgScore">-</div>
  </div>
</div>

<!-- PROGRESS -->
<div class="prog" id="prog">
  <div class="prog-info"><span id="progLabel">분석 중...</span><span id="progPct">0%</span></div>
  <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="table-col">

    <!-- FILTER TABS -->
    <div class="ftabs">
      <button class="ftab on" onclick="setTab(this,'all')">ALL</button>
      <button class="ftab" onclick="setTab(this,'now')">🚀 즉시진입</button>
      <button class="ftab" onclick="setTab(this,'watch')">👀 관찰</button>
      <button class="ftab" onclick="setTab(this,'wait')">대기</button>
    </div>

    <div class="tbl-wrap">
      <div class="empty" id="emptyMsg">
        <div class="empty-big">READY</div>
        <div class="empty-sub">
          매집점수 · 거래량 돌파 · 펀딩비 전환 · RSI 반등 · EMA 골든크로스<br>
          4가지 타이밍 신호 + ATR 손절/TP 자동 계산<br><br>
          ▶ SCAN 시작
        </div>
      </div>

      <table id="mainTbl" style="display:none">
        <thead>
          <tr>
            <th style="width:32px">#</th>
            <th onclick="sort('symbol')">심볼</th>
            <th onclick="sort('accumScore')" class="sorted">매집점수 ↓</th>
            <th>점수바</th>
            <th onclick="sort('timingCount')">타이밍 신호</th>
            <th onclick="sort('entryGrade')">진입등급</th>
            <th onclick="sort('price')">현재가</th>
            <th onclick="sort('sl')">손절가</th>
            <th onclick="sort('tp1')">TP1</th>
            <th onclick="sort('tp2')">TP2</th>
            <th onclick="sort('rr')">R:R</th>
            <th onclick="sort('change')">24h%</th>
          </tr>
        </thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-col" id="detailCol">
    <div class="dp" id="dpContent"></div>
  </div>
</div>

</div><!-- /root -->

<script>
// ── STATE ──────────────────────────────────────────────
let results = [];
let filtered = [];
let scanning = false;
let stopFlag = false;
let sortKey = 'accumScore';
let sortDir = -1;
let currentTab = 'all';
let selectedIdx = -1;

const API = 'https://fapi.binance.com';
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── CONTROLS ──────────────────────────────────────────
document.getElementById('minAccum').addEventListener('input', function(){
  document.getElementById('minAccumVal').textContent = this.value + '+';
  rerender();
});
document.getElementById('minRR').addEventListener('input', function(){
  document.getElementById('minRRVal').textContent = parseFloat(this.value).toFixed(1);
  rerender();
});

// ── API ───────────────────────────────────────────────
async function apiFetch(url){ const r = await fetch(url); if(!r.ok) throw new Error(r.status); return r.json(); }

async function getSymbols(){
  const minVol = +document.getElementById('minVol').value;
  const max = +document.getElementById('maxSym').value;
  const data = await apiFetch(`${API}/fapi/v1/ticker/24hr`);
  return data
    .filter(d => d.symbol.endsWith('USDT') && +d.quoteVolume >= minVol)
    .sort((a,b) => +b.quoteVolume - +a.quoteVolume)
    .slice(0, max);
}
async function getKlines(sym, tf, limit=150){
  return apiFetch(`${API}/fapi/v1/klines?symbol=${sym}&interval=${tf}&limit=${limit}`);
}
async function getFunding(sym){
  try{ return await apiFetch(`${API}/fapi/v1/fundingRate?symbol=${sym}&limit=8`); }catch{ return []; }
}
async function getOI(sym){
  try{ return await apiFetch(`${API}/futures/data/openInterestHist?symbol=${sym}&period=1h&limit=24`); }catch{ return []; }
}

// ── MATH ──────────────────────────────────────────────
const closes = k => k.map(x => +x[4]);
const highs   = k => k.map(x => +x[2]);
const lows    = k => k.map(x => +x[3]);
const volumes = k => k.map(x => +x[5]);
const qvols   = k => k.map(x => +x[7]);

function ema(arr, p){
  const k = 2/(p+1); let e = arr[0];
  return arr.map((v,i) => i===0 ? e : (e = v*k+e*(1-k)));
}
function rsi(arr, p=14){
  const res = new Array(p).fill(null);
  let ag=0, al=0;
  for(let i=1;i<=p;i++){const d=arr[i]-arr[i-1]; d>=0?ag+=d:al-=d;}
  ag/=p; al/=p;
  if(al===0) return [...res, 100];
  res.push(100-100/(1+ag/al));
  for(let i=p+1;i<arr.length;i++){
    const d=arr[i]-arr[i-1],g=d>=0?d:0,l=d<0?-d:0;
    ag=(ag*(p-1)+g)/p; al=(al*(p-1)+l)/p;
    res.push(al===0?100:100-100/(1+ag/al));
  }
  return res;
}
function atr(k, p=14){
  const trs=[];
  for(let i=1;i<k.length;i++){
    const h=+k[i][2],l=+k[i][3],pc=+k[i-1][4];
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  let a=trs.slice(0,p).reduce((s,v)=>s+v,0)/p;
  const res=[null,...trs.map((v,i)=>{if(i<p)return null;if(i===p)return a;return a=(a*(p-1)+v)/p;})];
  return res;
}
function slope(arr){ // linear regression slope, normalized
  const n=arr.length, xm=(n-1)/2, ym=arr.reduce((a,b)=>a+b,0)/n;
  let num=0,den=0;
  arr.forEach((v,i)=>{num+=(i-xm)*(v-ym);den+=(i-xm)**2;});
  return den===0?0:(num/den)/Math.abs(ym||1);
}
function bbwidth(cls, p=20){
  const res=[];
  for(let i=p-1;i<cls.length;i++){
    const sl=cls.slice(i-p+1,i+1),m=sl.reduce((a,b)=>a+b,0)/p;
    const std=Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/p);
    res.push(std*4/m);
  }
  return res;
}
function obv(k){
  let o=0; const arr=[];
  k.forEach((c,i)=>{
    if(i>0){const p=+k[i-1][4],cur=+k[i][4],v=+k[i][5];o+=cur>p?v:cur<p?-v:0;}
    arr.push(o);
  });
  return arr;
}
function adLine(k){
  let ad=0; return k.map(c=>{
    const h=+c[2],l=+c[3],cl=+c[4],v=+c[5];
    const mfm=h===l?0:((cl-l)-(h-cl))/(h-l);
    return ad+=mfm*v;
  });
}

// ── ACCUMULATION SCORE (100pt) ────────────────────────
function scoreAccum(k, funding, oi){
  const cls=closes(k), vols=volumes(k), qv=qvols(k);
  let vol_s=0, fund_s=0, price_s=0, wy_s=0, vvr_s=0;

  // 1. 거래량 이상 (25)
  const obvArr=obv(k), adArr=adLine(k);
  const ps=slope(cls.slice(-20)), os=slope(obvArr.slice(-20)), as_=slope(adArr.slice(-20));
  if(os>0&&ps<=0) vol_s+=12; else if(os>0&&os>ps*1.5) vol_s+=6;
  if(as_>0&&ps<=0.001) vol_s+=8; else if(as_>0) vol_s+=4;
  const avgV=vols.slice(-20,-5).reduce((a,b)=>a+b,0)/15;
  const recV=vols.slice(-5).reduce((a,b)=>a+b,0)/5;
  if(recV>avgV*2) vol_s+=5; else if(recV>avgV*1.5) vol_s+=3;

  // 2. 펀딩+OI (25)
  if(funding.length>0){
    const avg=funding.map(f=>+f.fundingRate).reduce((a,b)=>a+b,0)/funding.length;
    if(avg<-0.0001) fund_s+=13; else if(avg<0) fund_s+=8; else if(avg<0.0001) fund_s+=4;
  }
  if(oi.length>=8){
    const ois=oi.map(d=>+d.sumOpenInterest);
    const s=slope(ois.slice(-8));
    if(s>0.005) fund_s+=12; else if(s>0.001) fund_s+=7; else if(s>0) fund_s+=3;
  }

  // 3. 가격 구조 (20)
  const bbs=bbwidth(cls);
  if(bbs.length>=15){
    const rb=bbs.slice(-5).reduce((a,b)=>a+b,0)/5;
    const pb=bbs.slice(-20,-10).reduce((a,b)=>a+b,0)/10;
    if(rb<pb*0.5) price_s+=10; else if(rb<pb*0.7) price_s+=6; else if(rb<pb*0.85) price_s+=3;
  }
  const lw=lows(k).slice(-30), ml=Math.min(...lw);
  const st=lw.filter(l=>l<=ml*1.005).length;
  if(st>=4) price_s+=10; else if(st>=3) price_s+=7; else if(st>=2) price_s+=4;

  // 4. 와이코프 (15)
  const sl40=k.slice(-40), sl40l=sl40.map(x=>+x[3]);
  const sup=Math.min(...sl40l.slice(0,-5));
  let spring=false;
  for(let i=5;i<sl40.length-1;i++){if(+sl40[i][3]<sup*0.99&&+sl40[i][4]>+sl40[i][3]*1.005){spring=true;break;}}
  if(spring) wy_s+=9;
  if(Math.abs(slope(cls.slice(-30)))<0.0003) wy_s+=4;
  const v1=vols.slice(-15,-8).reduce((a,b)=>a+b,0)/7,v2=vols.slice(-7).reduce((a,b)=>a+b,0)/7;
  if(v2>v1*1.3) wy_s+=2;

  // 5. VVR (15)
  const atrArr=atr(k).filter(Boolean);
  const ra=atrArr.slice(-10).reduce((a,b)=>a+b,0)/10;
  const pa=atrArr.slice(-30,-10).reduce((a,b)=>a+b,0)/20;
  const rv=qv.slice(-10).reduce((a,b)=>a+b,0)/10;
  const pv=qv.slice(-30,-10).reduce((a,b)=>a+b,0)/20;
  const vvr=(rv/pv)/(ra/pa);
  if(vvr>2.5) vvr_s=15; else if(vvr>1.8) vvr_s=11; else if(vvr>1.3) vvr_s=7; else if(vvr>1) vvr_s=3;

  return {
    total: Math.min(vol_s+fund_s+price_s+wy_s+vvr_s, 100),
    vol_s:Math.min(vol_s,25), fund_s:Math.min(fund_s,25),
    price_s:Math.min(price_s,20), wy_s:Math.min(wy_s,15), vvr_s:Math.min(vvr_s,15),
    spring, supportTests:st
  };
}

// ── TIMING SIGNALS (4개) ──────────────────────────────
function checkTiming(k, funding){
  const cls=closes(k), vols=volumes(k);
  const results={};

  // 1. 거래량 돌파 캔들: 직전 고점 상방 + 거래량 평균 대비 급증
  const recentHigh = Math.max(...highs(k).slice(-20,-1));
  const lastClose = cls[cls.length-1];
  const lastHigh = +k[k.length-1][2];
  const lastVol = vols[vols.length-1];
  const avgVol20 = vols.slice(-21,-1).reduce((a,b)=>a+b,0)/20;
  const volBreak = lastHigh > recentHigh * 0.998 && lastVol > avgVol20 * 1.5;
  results.volBreak = { on: volBreak, val: `${(lastVol/avgVol20).toFixed(1)}x 거래량` };

  // 2. 펀딩비 음→양 전환
  let fundFlip = false, fundVal = '-';
  if(funding.length >= 3){
    const rates = funding.map(f=>+f.fundingRate);
    const prev = rates.slice(0,-1).reduce((a,b)=>a+b,0)/(rates.length-1);
    const last = rates[rates.length-1];
    fundFlip = prev < -0.00005 && last >= 0;
    fundVal = `${(prev*100).toFixed(4)}% → ${(last*100).toFixed(4)}%`;
  }
  results.fundFlip = { on: fundFlip, val: fundVal };

  // 3. RSI 과매도 반등: RSI<35였다가 현재>40
  const rsiArr = rsi(cls).filter(v=>v!==null);
  const rsiNow = rsiArr[rsiArr.length-1];
  const rsiMin5 = Math.min(...rsiArr.slice(-6,-1));
  const rsiBounce = rsiMin5 < 35 && rsiNow > 40;
  results.rsiBounce = { on: rsiBounce, val: `RSI ${rsiNow?.toFixed(1)} (저점${rsiMin5?.toFixed(1)})` };

  // 4. EMA 골든크로스: EMA20 > EMA50, 최근 교차
  const ema20 = ema(cls, 20), ema50 = ema(cls, 50);
  const last20 = ema20[ema20.length-1], last50 = ema50[ema50.length-1];
  const prev20 = ema20[ema20.length-4], prev50 = ema50[ema50.length-4];
  const golden = last20 > last50 && prev20 <= prev50;  // 최근 3봉 이내 교차
  const goldClose = last20 > last50*0.998 && last20 < last50*1.005; // 거의 교차 직전
  results.emaCross = {
    on: golden,
    partial: goldClose && !golden,
    val: `EMA20 ${last20>last50?'>':'<'} EMA50 (${((last20/last50-1)*100).toFixed(2)}%)`
  };

  const count = [results.volBreak.on, results.fundFlip.on, results.rsiBounce.on, results.emaCross.on].filter(Boolean).length;
  return { ...results, count };
}

// ── ENTRY CALC (ATR 기반) ─────────────────────────────
function calcEntry(k){
  const cls=closes(k), lw=lows(k);
  const price=cls[cls.length-1];
  const atrArr=atr(k).filter(Boolean);
  const atrNow=atrArr[atrArr.length-1];

  // 손절: 최근 저점 또는 1.5 ATR 아래 (더 큰 쪽)
  const swingLow=Math.min(...lw.slice(-10));
  const slATR=price-atrNow*1.5;
  const sl=Math.min(swingLow*0.997, slATR);

  const risk=price-sl;
  const tp1=price+risk*1.5;   // RR 1.5
  const tp2=price+risk*3.0;   // RR 3.0
  const rr=risk>0?(tp2-price)/risk:0;

  return { price, sl, tp1, tp2, rr, atr:atrNow, slPct:((price-sl)/price*100) };
}

// ── ANALYZE ONE SYMBOL ────────────────────────────────
async function analyze(ticker, tf){
  const sym=ticker.symbol;
  const [k, funding, oi] = await Promise.all([getKlines(sym,tf,150), getFunding(sym), getOI(sym)]);
  const accum=scoreAccum(k,funding,oi);
  const timing=checkTiming(k,funding);
  const entry=calcEntry(k);

  // 진입 등급
  let grade='wait';
  const minAccum=+document.getElementById('minAccum').value;
  const minTiming=+document.getElementById('minTiming').value;
  const minRR=+document.getElementById('minRR').value;

  if(accum.total>=minAccum && timing.count>=minTiming && entry.rr>=minRR) grade='now';
  else if(accum.total>=minAccum && timing.count>=minTiming-1) grade='watch';

  return {
    symbol:sym, price:entry.price, change:+ticker.priceChangePercent,
    volume:+ticker.quoteVolume, accumScore:accum.total,
    timingCount:timing.count,
    entryGrade:grade==='now'?3:grade==='watch'?2:1,
    sl:entry.sl, tp1:entry.tp1, tp2:entry.tp2, rr:entry.rr,
    atr:entry.atr, slPct:entry.slPct,
    _accum:accum, _timing:timing, _entry:entry, _grade:grade
  };
}

// ── SCAN ──────────────────────────────────────────────
async function startScan(){
  if(scanning) return;
  scanning=true; stopFlag=false; results=[];
  document.getElementById('scanBtn').style.display='none';
  document.getElementById('stopBtn').style.display='inline-block';
  document.getElementById('prog').classList.add('on');
  document.getElementById('mainTbl').style.display='none';
  document.getElementById('emptyMsg').style.display='none';
  setStatus('scanning','SCANNING');

  try{
    const tf=document.getElementById('tfSel').value;
    const tickers=await getSymbols();
    let done=0;
    for(let i=0;i<tickers.length;i+=5){
      if(stopFlag) break;
      const batch=tickers.slice(i,i+5);
      const res=await Promise.allSettled(batch.map(t=>analyze(t,tf)));
      res.forEach(r=>{ if(r.status==='fulfilled') results.push(r.value); done++; });
      const pct=Math.round((done/tickers.length)*100);
      document.getElementById('progFill').style.width=pct+'%';
      document.getElementById('progPct').textContent=pct+'%';
      document.getElementById('progLabel').textContent=`분석 중... ${done}/${tickers.length}`;
      document.getElementById('sScanned').textContent=done;
      rerender();
      await sleep(120);
    }
  }catch(e){ console.error(e); }

  scanning=false; stopFlag=false;
  document.getElementById('scanBtn').style.display='inline-block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('prog').classList.remove('on');
  setStatus('done','COMPLETE');
  document.getElementById('updateTime').textContent=new Date().toLocaleTimeString('ko-KR');
}

function stopScan(){ stopFlag=true; setStatus('','STOPPING'); }

function setStatus(cls, txt){
  const dot=document.getElementById('statusDot');
  dot.className='dot'+(cls?' '+cls:'');
  document.getElementById('statusTxt').textContent=txt;
}

// ── RENDER ────────────────────────────────────────────
function rerender(){
  const minAccum=+document.getElementById('minAccum').value;
  const minRR=+document.getElementById('minRR').value;

  // recompute grades with current filters
  results.forEach(r=>{
    const minTiming=+document.getElementById('minTiming').value;
    if(r.accumScore>=minAccum && r.timingCount>=minTiming && r.rr>=minRR) r._grade='now';
    else if(r.accumScore>=minAccum && r.timingCount>=minTiming-1) r._grade='watch';
    else r._grade='wait';
    r.entryGrade=r._grade==='now'?3:r._grade==='watch'?2:1;
  });

  // filter by tab
  filtered=results.filter(r=>{
    if(currentTab==='now') return r._grade==='now';
    if(currentTab==='watch') return r._grade==='watch';
    if(currentTab==='wait') return r._grade==='wait';
    return true;
  }).sort((a,b)=>sortDir*(b[sortKey]-a[sortKey]));

  // stats
  const now=results.filter(r=>r._grade==='now');
  const watch=results.filter(r=>r._grade==='watch');
  document.getElementById('sNow').textContent=now.length;
  document.getElementById('sWatch').textContent=watch.length;
  const rrs=results.map(r=>r.rr).filter(r=>r>0);
  document.getElementById('sBestRR').textContent=rrs.length?Math.max(...rrs).toFixed(1)+'x':'-';
  const scores=results.map(r=>r.accumScore);
  document.getElementById('sAvgScore').textContent=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(0):'-';

  if(filtered.length===0){
    document.getElementById('mainTbl').style.display='none';
    const em=document.getElementById('emptyMsg');
    em.style.display='block';
    em.innerHTML=`<div class="empty-big">--</div><div class="empty-sub">해당 조건의 심볼 없음<br>필터를 조정해보세요</div>`;
    return;
  }
  document.getElementById('mainTbl').style.display='table';
  document.getElementById('emptyMsg').style.display='none';

  const tc=['VOL','FND','RSI','EMA'];
  document.getElementById('tblBody').innerHTML=filtered.map((r,i)=>{
    const sc=scoreClr(r.accumScore);
    const timing=r._timing;
    const tDots=[timing.volBreak.on,timing.fundFlip.on,timing.rsiBounce.on,timing.emaCross.on||timing.emaCross.partial];
    const chgCls=r.change>=0?'chg-p':'chg-n';

    const ebTxt=r._grade==='now'?'🚀 진입':r._grade==='watch'?'👀 관찰':'대기';
    const rrCls=r.rr>=3?'rr-good':r.rr>=2?'rr-ok':'rr-bad';
    const trCls=(r._grade==='now'?'entry-ready ':'')+( selectedIdx===i?'selected':'');
    return `<tr class="${trCls}" onclick="showDetail(${i})">
      <td style="color:var(--text2);font-size:10px">${i+1}</td>
      <td class="sym">${r.symbol.replace('USDT','')}<sub>/USDT</sub></td>
      <td class="score-big" style="color:${sc}">${r.accumScore}</td>
      <td><div class="score-bar-wrap"><div class="sbar-bg"><div class="sbar-fill" style="width:${r.accumScore}%;background:${sc}"></div></div></div></td>

          <span style="margin-left:4px;font-family:var(--mono);font-size:10px;color:${r.timingCount>=3?'var(--green)':'var(--text2)'}">${r.timingCount}/4</span>

  }).join('');
}

function sort(key){
  if(sortKey===key) sortDir*=-1; else{sortKey=key;sortDir=-1;}
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
  event.target.classList.add('sorted');
  rerender();
}

  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));

      ⚠ 이 스캐너는 진입 가능성을 분석하며, 수익을 보장하지 않습니다.<br>
      반드시 리스크 관리 규칙을 지키고, 포지션당 자본의 1~2% 이내로 손절 설정을 권장합니다.
    </div>
  `;
  rerender();
}

// ── UTILS ─────────────────────────────────────────────
function scoreClr(s){
  if(s>=70) return 'var(--yellow)';
  if(s>=50) return 'var(--green)';
  if(s>=30) return 'var(--cyan)';
  return 'var(--text2)';
}
function fmtPrice(p){
  if(p>=1000) return p.toFixed(2);
  if(p>=1) return p.toFixed(4);
  if(p>=0.01) return p.toFixed(5);
  return p.toFixed(6);
}
</script>
