<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PERP SCANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05080f;
  --surface: #0a0f1e;
  --surface2: #0f1628;
  --border: rgba(56,100,255,0.15);
  --border2: rgba(56,100,255,0.08);
  --accent: #3864ff;
  --accent-glow: rgba(56,100,255,0.25);
  --green: #00e5a0;
  --green-dim: rgba(0,229,160,0.12);
  --red: #ff3d6b;
  --red-dim: rgba(255,61,107,0.12);
  --yellow: #ffc840;
  --text: #dce8ff;
  --muted: rgba(180,200,255,0.45);
  --mono: 'JetBrains Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --body: 'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* noise overlay */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.4;
}

/* grid bg */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(56,100,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,100,255,0.04) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;z-index:0;
}

.wrap{
  position:relative;z-index:1;
  max-width:1080px;
  margin:0 auto;
  padding:32px 20px 80px;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:20px;margin-bottom:36px;flex-wrap:wrap;
}
.logo{
  font-family:var(--display);
  font-size:52px;letter-spacing:2px;line-height:1;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--green) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo span{font-size:18px;font-family:var(--mono);letter-spacing:3px;display:block;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:4px;}

.timer-ring{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.ring-wrap{position:relative;width:72px;height:72px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-track{fill:none;stroke:var(--border);stroke-width:4;}
.ring-fill{
  fill:none;stroke:var(--accent);stroke-width:4;
  stroke-linecap:round;
  stroke-dasharray:201;stroke-dashoffset:201;
  transition:stroke-dashoffset 1s linear;
}
.ring-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);
}
.timer-status{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center;}

/* ── CONFIG CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.5;
}
.card-label{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);font-family:var(--mono);margin-bottom:16px;
}

.config-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;margin-bottom:16px;
}
.field label{
  display:block;font-size:10px;font-family:var(--mono);
  color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;
}
.field input{
  width:100%;height:40px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);font-family:var(--mono);font-size:13px;
  padding:0 12px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;}
button{
  height:44px;padding:0 22px;border-radius:12px;border:none;
  font-family:var(--body);font-weight:700;font-size:14px;
  cursor:pointer;transition:all .2s;letter-spacing:0.3px;
}
#startBtn{
  background:linear-gradient(135deg,var(--accent),#6040ff);
  color:#fff;
  box-shadow:0 4px 20px var(--accent-glow);
}
#startBtn:hover{transform:translateY(-1px);box-shadow:0 8px 28px var(--accent-glow);}
#startBtn:disabled{opacity:0.4;transform:none;cursor:not-allowed;}
#stopBtn{
  background:var(--red-dim);color:var(--red);
  border:1px solid rgba(255,61,107,0.25);
}
#stopBtn:hover{background:rgba(255,61,107,0.2);}
#manualBtn{
  background:var(--green-dim);color:var(--green);
  border:1px solid rgba(0,229,160,0.25);
}
#manualBtn:hover{background:rgba(0,229,160,0.2);}
#manualBtn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── STATS ── */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;margin-bottom:16px;
}
.stat{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;padding:14px 10px;
  text-align:center;
}
.stat .k{font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.stat .v{font-size:24px;font-weight:700;font-family:var(--mono);}

/* ── PROGRESS ── */
.progress-wrap{height:2px;background:var(--border2);border-radius:99px;margin-bottom:16px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;width:0%;transition:width .4s;}

/* ── LOG ── */
.log-box{
  height:120px;overflow-y:auto;
  font-family:var(--mono);font-size:11px;line-height:1.8;
  color:var(--muted);
}
.log-box::-webkit-scrollbar{width:4px;}
.log-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.log-hit{color:var(--green);}
.log-err{color:var(--red);}
.log-info{color:var(--accent);}
.log-warn{color:var(--yellow);}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border2);}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;min-width:800px;}
thead th{
  background:rgba(56,100,255,0.06);
  padding:12px 14px;text-align:left;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--border2);
  white-space:nowrap;
}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border2);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .15s;}
tbody tr:hover{background:rgba(56,100,255,0.05);}

.sym{font-weight:700;color:#fff;font-size:13px;}
.long-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--green-dim);color:var(--green);
  padding:3px 10px;border-radius:6px;font-weight:700;font-size:11px;
}
.short-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--red-dim);color:var(--red);
  padding:3px 10px;border-radius:6px;font-weight:700;font-size:11px;
}
.lev-high{color:var(--green);font-weight:700;}
.lev-mid{color:var(--yellow);font-weight:700;}
.lev-low{color:var(--red);font-weight:700;}
.price{color:var(--text);}
.muted-cell{color:var(--muted);}
.up{color:var(--green);}
.dn{color:var(--red);}

.empty-state{
  text-align:center;padding:48px 20px;
  color:var(--muted);font-size:13px;line-height:2;
}

/* auto badge */
.auto-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(56,100,255,0.1);
  border:1px solid rgba(56,100,255,0.2);
  border-radius:99px;padding:4px 12px;
  font-size:11px;font-family:var(--mono);color:var(--accent);
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

@media(max-width:700px){
  .stats-grid{grid-template-columns:repeat(3,1fr);}
  .config-grid{grid-template-columns:1fr;}
  .logo{font-size:38px;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo">PERP SCANNER<span>Binance USDⓈ-M Futures</span></div>
    </div>
    <div class="timer-ring">
      <div class="ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-track" cx="36" cy="36" r="32"/>
          <circle class="ring-fill" id="ringFill" cx="36" cy="36" r="32"/>
        </svg>
        <div class="ring-label" id="ringLabel">—</div>
      </div>
      <div class="timer-status" id="timerStatus">대기 중</div>
    </div>
  </div>

  <!-- Config -->
  <div class="card">
    <div class="card-label">설정</div>
    <div class="config-grid">
      <div class="field">
        <label>RSI 과매도 기준 (LONG)</label>
        <input id="rsiOS" type="number" value="35"/>
      </div>
      <div class="field">
        <label>RSI 과매수 기준 (SHORT)</label>
        <input id="rsiOB" type="number" value="65"/>
      </div>
      <div class="field">
        <label>거래량 스파이크 배수</label>
        <input id="volMult" type="number" step="0.1" value="1.5"/>
      </div>
      <div class="field">
        <label>최소 24h 거래대금 (백만 USDT)</label>
        <input id="minVol" type="number" value="10"/>
      </div>
    </div>
    <div class="btn-row">
      <button id="startBtn">▶ 자동 스캔 시작 (15분)</button>
      <button id="stopBtn">■ 중지</button>
      <button id="manualBtn" disabled>⚡ 지금 즉시 스캔</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat"><div class="k">전체 심볼</div><div class="v" id="stTotal">—</div></div>
    <div class="stat"><div class="k">스캔 완료</div><div class="v" id="stScanned">0</div></div>
    <div class="stat"><div class="k">시그널</div><div class="v" id="stSignal" style="color:var(--green)">0</div></div>
    <div class="stat"><div class="k">LONG</div><div class="v" id="stLong" style="color:var(--green)">0</div></div>
    <div class="stat"><div class="k">SHORT</div><div class="v" id="stShort" style="color:var(--red)">0</div></div>
    <div class="stat"><div class="k">진행률</div><div class="v" id="stPct">0%</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <!-- Log -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="card-label" style="margin:0">실시간 로그</div>
      <span class="auto-badge" id="autoBadge" style="display:none"><span class="dot"></span> 자동 실행 중</span>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- Results -->
  <div class="card">
    <div class="card-label">스캔 결과</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>심볼</th>
            <th>방향</th>
            <th>진입가격</th>
            <th>익절가격</th>
            <th>손절가격</th>
            <th>최대레버리지</th>
            <th>RSI</th>
            <th>RR</th>
            <th>24h</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr><td colspan="9" class="empty-state">자동 스캔 시작 버튼을 누르면<br>15분마다 자동으로 스캔하고 텔레그램으로 전송해요</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ── 상수
const API = 'https://fapi.binance.com';
const INTERVAL = '15m';
const KLINE_LIMIT = 200;
const BATCH = 10;
const MMR = 0.005;
const SCAN_INTERVAL_MS = 15 * 60 * 1000; // 15분
const ATR_SL = 1.5;
const ATR_TP = 3.0;

// ── 상태
let autoTimer = null;
let countdownTimer = null;
let nextScanAt = null;
let scanning = false;
let stopReq = false;
let results = [];
let total = 0;
let scanned = 0;

// ── DOM
const $ = id => document.getElementById(id);
const logBox = $('logBox');

function log(msg, cls='') {
  const t = new Date().toLocaleTimeString('ko-KR');
  const d = document.createElement('div');
  if(cls) d.className = cls;
  d.textContent = `[${t}] ${msg}`;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
  // 로그 최대 200줄
  while(logBox.children.length > 200) logBox.removeChild(logBox.firstChild);
}

function updateStats() {
  const longs  = results.filter(r=>r.dir==='LONG').length;
  const shorts = results.filter(r=>r.dir==='SHORT').length;
  $('stTotal').textContent   = total||'—';
  $('stScanned').textContent = scanned;
  $('stSignal').textContent  = results.length;
  $('stLong').textContent    = longs;
  $('stShort').textContent   = shorts;
  const pct = total>0 ? (scanned/total*100) : 0;
  $('stPct').textContent     = pct.toFixed(1)+'%';
  $('progressBar').style.width = pct+'%';
}

function fmtPrice(p) {
  if(!p) return '—';
  if(p>=10000) return p.toLocaleString('en',{maximumFractionDigits:1});
  if(p>=1)     return p.toFixed(4);
  return p.toFixed(6);
}

function renderTable() {
  if(!results.length) {
    resultBody.innerHTML = '<tr><td colspan="9" class="empty-state">조건 충족 심볼 없음<br>다음 스캔을 기다리는 중...</td></tr>';
    return;
  }
  resultBody.innerHTML = results.map(r => {
    const badge  = r.dir==='LONG'
      ? `<span class="long-badge">▲ LONG</span>`
      : `<span class="short-badge">▼ SHORT</span>`;
    const levCls = r.lev>=20?'lev-high':r.lev>=5?'lev-mid':'lev-low';
    const chgCls = r.chg>=0?'up':'dn';
    const chgSign= r.chg>=0?'+':'';
    return `<tr>
      <td class="sym">${r.sym}</td>
      <td>${badge}</td>
      <td class="price">${fmtPrice(r.entry)}</td>
      <td class="up">${fmtPrice(r.tp)}</td>
      <td class="dn">${fmtPrice(r.sl)}</td>
      <td class="${levCls}">×${r.lev}</td>
      <td class="muted-cell">${r.rsi}</td>
      <td class="muted-cell">1:${r.rr}</td>
      <td class="${chgCls}">${chgSign}${r.chg.toFixed(2)}%</td>
    </tr>`;
  }).join('');
}

// ── 지표
function ema(arr, p) {
  if(arr.length<p) return null;
  const k=2/(p+1);
  let e=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for(let i=p;i<arr.length;i++) e=arr[i]*k+e*(1-k);
  return e;
}
function rsi(arr, p=14) {
  if(arr.length<p+2) return null;
  let g=0,l=0;
  const s=arr.slice(-p-1);
  for(let i=1;i<s.length;i++){const d=s[i]-s[i-1];if(d>0)g+=d;else l-=d;}
  const ag=g/p,al=l/p;
  if(al===0) return 100;
  return 100-100/(1+ag/al);
}
function atr(hi,lo,cl,p=14) {
  if(cl.length<p+1) return null;
  const tr=[];
  for(let i=1;i<cl.length;i++) tr.push(Math.max(hi[i]-lo[i],Math.abs(hi[i]-cl[i-1]),Math.abs(lo[i]-cl[i-1])));
  return tr.slice(-p).reduce((a,b)=>a+b,0)/p;
}

function analyze(sym, klines, ticker) {
  if(!klines||klines.length<KLINE_LIMIT) return null;
  const o=klines.map(k=>+k[1]),hi=klines.map(k=>+k[2]),lo=klines.map(k=>+k[3]),cl=klines.map(k=>+k[4]),vl=klines.map(k=>+k[5]);
  const RSI_OS=+$('rsiOS').value||35;
  const RSI_OB=+$('rsiOB').value||65;
  const VOL_X =+$('volMult').value||1.5;
  const e20=ema(cl,20),e50=ema(cl,50),r=rsi(cl,14),a=atr(hi,lo,cl,14);
  if(!e20||!e50||r===null||!a) return null;
  const pv=vl[vl.length-2],avgV=vl.slice(-22,-2).reduce((a,b)=>a+b,0)/20;
  const bull=cl[cl.length-2]>o[o.length-2];
  const bear=cl[cl.length-2]<o[o.length-2];
  const spike=pv>avgV*VOL_X;
  const entry=cl[cl.length-1];
  let dir=null,sl,tp;
  if(e20>e50&&r<RSI_OS&&spike&&bull){dir='LONG';sl=entry-a*ATR_SL;tp=entry+a*ATR_TP;}
  else if(e20<e50&&r>RSI_OB&&spike&&bear){dir='SHORT';sl=entry+a*ATR_SL;tp=entry-a*ATR_TP;}
  else return null;
  const levE=dir==='LONG'?1/(1+MMR-sl/entry):1/(sl/entry-1+MMR);
  const lev=Math.max(1,Math.min(125,Math.floor(levE)-1));
  return {
    sym:sym.replace('USDT','/USDT'),dir,entry,tp,sl,lev,
    rsi:r.toFixed(1),rr:(ATR_TP/ATR_SL).toFixed(1),
    chg:ticker?+ticker.priceChangePercent:0
  };
}

// ── fetch
async function apiFetch(url, retries=2) {
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }catch(e){
      if(i===retries) throw e;
      await new Promise(r=>setTimeout(r,600*(i+1)));
    }
  }
}

async function getSymbols() {
  const d=await apiFetch(`${API}/fapi/v1/exchangeInfo`);
  return d.symbols.filter(s=>s.quoteAsset==='USDT'&&s.contractType==='PERPETUAL'&&s.status==='TRADING').map(s=>s.symbol);
}

// ── 브라우저 알림
async function requestNotifPerm() {
  if(Notification.permission==='default') {
    await Notification.requestPermission();
  }
}

function sendNotif(title, body, icon='📡') {
  if(Notification.permission!=='granted') return;
  const n = new Notification(title, {
    body,
    icon: 'https://fapi.binance.com/favicon.ico',
    requireInteraction: true,  // 클릭 전까지 알림 유지
  });
  // 클릭 시 탭 포커스
  n.onclick = () => { window.focus(); n.close(); };
}

function fireNotifs() {
  if(!results.length) {
    // 시그널 없으면 조용히 (알림 생략)
    return;
  }
  const longs  = results.filter(r=>r.dir==='LONG').length;
  const shorts = results.filter(r=>r.dir==='SHORT').length;
  const now    = new Date().toLocaleTimeString('ko-KR');

  // 요약 알림 1개
  sendNotif(
    `⚡ PERP SCANNER — ${results.length}개 시그널`,
    `🟢 LONG ${longs}개  🔴 SHORT ${shorts}개\n${now}`
  );

  // 시그널별 개별 알림
  for(const r of results) {
    const icon = r.dir==='LONG' ? '🟢' : '🔴';
    const chgSign = r.chg>=0?'+':'';
    sendNotif(
      `${icon} ${r.sym} — ${r.dir}`,
      `진입 ${fmtPrice(r.entry)}  TP ${fmtPrice(r.tp)}  SL ${fmtPrice(r.sl)}\n최대레버리지 ×${r.lev}  RSI ${r.rsi}  24h ${chgSign}${r.chg.toFixed(2)}%`
    );
  }
}

// ── 스캔 실행
async function doScan() {
  if(scanning) return;
  scanning=true;
  stopReq=false;
  results=[];scanned=0;total=0;
  updateStats();
  renderTable();
  $('manualBtn').disabled=true;

  try{
    log('심볼 목록 조회 중...','log-info');
    const syms=await getSymbols();
    total=syms.length;
    updateStats();
    log(`전체 ${syms.length}개 심볼 스캔 시작`,'log-info');

    const minVol=(+$('minVol').value||10)*1_000_000;

    for(let i=0;i<syms.length;i+=BATCH){
      if(stopReq) break;
      const batch=syms.slice(i,i+BATCH);
      const res=await Promise.allSettled(batch.map(async sym=>{
        const [kl,tk]=await Promise.all([
          apiFetch(`${API}/fapi/v1/klines?symbol=${sym}&interval=${INTERVAL}&limit=${KLINE_LIMIT}`),
          apiFetch(`${API}/fapi/v1/ticker/24hr?symbol=${sym}`)
        ]);
        if(tk&&+tk.quoteVolume<minVol) return null;
        return analyze(sym,kl,tk);
      }));
      for(const r of res){
        scanned++;
        if(r.status==='fulfilled'&&r.value){
          results.push(r.value);
          log(`[HIT] ${r.value.sym} ${r.value.dir} | 진입 ${fmtPrice(r.value.entry)} | ×${r.value.lev}`,'log-hit');
          renderTable();
        }
      }
      updateStats();
      await new Promise(r=>setTimeout(r,120));
    }

    log(`✅ 스캔 완료 — ${results.length}개 시그널 발견`,'log-hit');
    fireNotifs();

  }catch(e){
    log(`❌ 오류: ${e.message}`,'log-err');
    // 오류 알림
    sendNotif('🚨 PERP SCANNER 오류', e.message);
  }finally{
    scanning=false;
    $('manualBtn').disabled=false;
  }
}

// ── 카운트다운 링
function startCountdown() {
  if(countdownTimer) clearInterval(countdownTimer);
  const circumference=201;
  countdownTimer=setInterval(()=>{
    if(!nextScanAt){$('ringLabel').textContent='—';return;}
    const remain=Math.max(0,nextScanAt-Date.now());
    const mins=Math.floor(remain/60000);
    const secs=Math.floor((remain%60000)/1000);
    $('ringLabel').textContent=`${mins}:${String(secs).padStart(2,'0')}`;
    const pct=1-(remain/SCAN_INTERVAL_MS);
    $('ringFill').style.strokeDashoffset=circumference-(circumference*pct);
    $('timerStatus').textContent=remain>0?'다음 스캔까지':'스캔 중...';
    if(remain===0){
      $('ringFill').style.stroke='var(--green)';
      setTimeout(()=>{$('ringFill').style.stroke='var(--accent)';},2000);
    }
  },1000);
}

// ── 자동 스캔 루프
async function autoScanLoop() {
  $('autoBadge').style.display='inline-flex';
  log('🚀 자동 스캔 시작 (15분 간격)','log-info');
  while(!stopReq){
    nextScanAt=Date.now()+SCAN_INTERVAL_MS;
    // 즉시 첫 스캔
    await doScan();
    if(stopReq) break;
    // 15분 대기
    nextScanAt=Date.now()+SCAN_INTERVAL_MS;
    await new Promise(r=>{
      const t=setInterval(()=>{
        if(stopReq||Date.now()>=nextScanAt){clearInterval(t);r();}
      },1000);
    });
  }
  $('autoBadge').style.display='none';
  nextScanAt=null;
  $('ringLabel').textContent='—';
  $('timerStatus').textContent='중지됨';
  log('■ 자동 스캔 중지됨','log-warn');
}

// ── 버튼
$('startBtn').addEventListener('click', async ()=>{
  await requestNotifPerm();
  if(Notification.permission!=='granted'){
    alert('브라우저 알림을 허용해주세요. 주소창 왼쪽 자물쇠 아이콘을 클릭해서 알림을 허용할 수 있어요.');
    return;
  }
  stopReq=false;
  $('startBtn').disabled=true;
  $('stopBtn').disabled=false;
  $('manualBtn').disabled=false;
  startCountdown();
  autoScanLoop().finally(()=>{
    $('startBtn').disabled=false;
    $('stopBtn').disabled=true;
  });
});

$('stopBtn').addEventListener('click',()=>{
  stopReq=true;
  $('stopBtn').disabled=true;
  log('중지 요청됨...','log-warn');
});

$('manualBtn').addEventListener('click',()=>{
  nextScanAt=Date.now()+SCAN_INTERVAL_MS;
  doScan();
});

const resultBody=$('resultBody');
</script>
