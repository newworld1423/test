<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQUEEZE HUNT — Low Float Scanner</title>
<style>
  :root {
    --bg: #090b0f;
    --bg2: #0d1017;
    --bg3: #12161e;
    --border: #1a2030;
    --border2: #243040;
    --text: #ccd8e8;
    --muted: #485a72;
    --accent: #f0a030;
    --accent2: #c07818;
    --green: #38c878;
    --red: #e04848;
    --blue: #4090e0;
    --purple: #9060e0;
    --font: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; min-height: 100vh; }

  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg2); position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 15px; font-weight: bold; letter-spacing: 3px; color: var(--accent); }
  .logo span { color: var(--muted); font-size: 10px; letter-spacing: 1px; margin-left: 6px; }
  #status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  #dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; }
  #dot.active { background: var(--green); }
  #dot.scanning { background: var(--accent); }
  .ctrl-btn {
    background: transparent; border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 11px; padding: 5px 12px; cursor: pointer;
    letter-spacing: 1px; transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.on { border-color: var(--green); color: var(--green); }

  #filters {
    display: flex; align-items: center; gap: 16px; padding: 8px 20px;
    border-bottom: 1px solid var(--border); background: var(--bg2); flex-wrap: wrap;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .filter-val { font-size: 11px; color: var(--text); min-width: 36px; text-align: right; }
  input[type=range] {
    width: 80px; height: 3px; background: var(--border2); outline: none;
    -webkit-appearance: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }

  #stats-bar {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: var(--bg2); padding: 0 20px;
  }
  .stat { padding: 8px 20px 8px 0; margin-right: 20px; border-right: 1px solid var(--border); font-size: 11px; }
  .stat:last-child { border-right: none; }
  .stat-label { color: var(--muted); margin-bottom: 2px; font-size: 10px; }
  .stat-val { color: var(--text); font-size: 13px; }

  #loading { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; letter-spacing: 2px; }
  #loading-bar { width: 200px; height: 2px; background: var(--border); margin: 16px auto 0; overflow: hidden; border-radius: 1px; }
  #loading-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }
  #loading-sub { font-size: 10px; color: var(--muted); margin-top: 8px; letter-spacing: 1px; }

  #table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 960px; }
  thead th {
    background: var(--bg3); color: var(--muted); font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 9px 12px; border-bottom: 1px solid var(--border);
    text-align: right; white-space: nowrap; font-weight: normal;
  }
  thead th:first-child, thead th:nth-child(2) { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:hover { background: var(--bg3); }
  td { padding: 8px 12px; text-align: right; white-space: nowrap; font-size: 11px; }
  td:first-child, td:nth-child(2) { text-align: left; }

  .rank { color: var(--muted); font-size: 10px; }
  .symbol { font-size: 12px; font-weight: bold; letter-spacing: 0.5px; color: var(--text); }
  .symbol-sub { font-size: 9px; color: var(--muted); }

  .score-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .score-bar { width: 55px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .score-num { min-width: 26px; font-size: 12px; font-weight: bold; }
  .s90 { color: #f0a030; }
  .s70 { color: #c0c030; }
  .s50 { color: #38c878; }
  .slow { color: #485a72; }

  .val-green { color: var(--green); }
  .val-red { color: var(--red); }
  .val-amber { color: var(--accent); }
  .val-blue { color: var(--blue); }
  .val-purple { color: var(--purple); }
  .val-muted { color: var(--muted); }

  .badge {
    display: inline-block; font-size: 9px; padding: 2px 5px; border-radius: 2px;
    letter-spacing: 0.5px; margin: 0 1px;
  }
  .badge-new { background: rgba(144,96,224,0.15); color: #9060e0; border: 1px solid rgba(144,96,224,0.3); }
  .badge-vol { background: rgba(240,160,48,0.15); color: #f0a030; border: 1px solid rgba(240,160,48,0.3); }
  .badge-fund { background: rgba(224,72,72,0.15); color: #e04848; border: 1px solid rgba(224,72,72,0.3); }
  .badge-obv { background: rgba(64,144,224,0.15); color: #4090e0; border: 1px solid rgba(64,144,224,0.3); }
  .badge-float { background: rgba(56,200,120,0.15); color: #38c878; border: 1px solid rgba(56,200,120,0.3); }

  #notif-banner {
    background: rgba(56,200,120,0.1); border-bottom: 1px solid rgba(56,200,120,0.2);
    color: var(--green); font-size: 11px; padding: 7px 20px; display: none;
  }
  #empty { text-align: center; padding: 50px; color: var(--muted); letter-spacing: 1px; }
  #next-scan { font-size: 11px; color: var(--muted); min-width: 90px; text-align: right; }

  .heat-row-90 { border-left: 2px solid rgba(240,160,48,0.6); }
  .heat-row-70 { border-left: 2px solid rgba(192,192,48,0.4); }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="logo">SQUEEZE HUNT <span>// LOW FLOAT RADAR</span></div>
    <div id="status"><span id="dot"></span><span id="status-text">대기중</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="next-scan">--:--</div>
    <button class="ctrl-btn" id="notif-btn" onclick="toggleNotif()">🔔 알림 OFF</button>
    <button class="ctrl-btn" onclick="runScan()">▶ 지금 스캔</button>
  </div>
</div>

<div id="notif-banner">✓ 알림 허용됨 — 고점수 종목 발견 시 알림을 받습니다.</div>

<div id="filters">
  <div class="filter-group">
    <span class="filter-label">거래량 급증 기준</span>
    <input type="range" id="vol-thresh" min="3" max="20" value="5" step="1" oninput="document.getElementById('vol-val').textContent=this.value+'x'">
    <span class="filter-val" id="vol-val">5x</span>
  </div>
  <div class="filter-group">
    <span class="filter-label">최소 가격상승 (4h)</span>
    <input type="range" id="chg-thresh" min="3" max="30" value="8" step="1" oninput="document.getElementById('chg-val').textContent=this.value+'%'">
    <span class="filter-val" id="chg-val">8%</span>
  </div>
  <div class="filter-group">
    <span class="filter-label">최소 펀딩비</span>
    <input type="range" id="fund-thresh" min="0" max="5" value="0" step="1" oninput="document.getElementById('fund-val').textContent=['0%','0.01%','0.03%','0.05%','0.1%','0.3%'][this.value]">
    <span class="filter-val" id="fund-val">0%</span>
  </div>
  <div class="filter-group">
    <span class="filter-label">결과 수</span>
    <input type="range" id="top-n" min="10" max="50" value="30" step="5" oninput="document.getElementById('topn-val').textContent=this.value">
    <span class="filter-val" id="topn-val">30</span>
  </div>
</div>

<div id="stats-bar">
  <div class="stat"><div class="stat-label">전체 종목</div><div class="stat-val" id="s-total">—</div></div>
  <div class="stat"><div class="stat-label">거래량 급증</div><div class="stat-val" id="s-vol">—</div></div>
  <div class="stat"><div class="stat-label">급등 후보</div><div class="stat-val" id="s-cand">—</div></div>
  <div class="stat"><div class="stat-label">진입 후보 (≥70)</div><div class="stat-val" id="s-hot">—</div></div>
  <div class="stat"><div class="stat-label">마지막 스캔</div><div class="stat-val" id="s-time">—</div></div>
</div>

<div id="table-wrap">
  <div id="loading">INITIALIZING SQUEEZE RADAR...<div id="loading-bar"><div id="loading-fill"></div></div><div id="loading-sub"></div></div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th style="text-align:left">#</th>
        <th style="text-align:left">심볼</th>
        <th>급등 점수</th>
        <th>현재가</th>
        <th>4h 변화</th>
        <th>1h 변화</th>
        <th>거래량 배율</th>
        <th>펀딩비</th>
        <th>OBV 추세</th>
        <th>눌림 여부</th>
        <th>신호</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" style="display:none">조건을 만족하는 종목이 없습니다. 필터를 낮춰보세요.</div>
</div>

<script>
let notifEnabled = false;
let lastAlerted = {};
let countdownId = null;
let tickId = null;

const FUND_LEVELS = [0, 0.0001, 0.0003, 0.0005, 0.001, 0.003];

function toggleNotif() {
  if (!notifEnabled) {
    Notification.requestPermission().then(p => {
      if (p === 'granted') {
        notifEnabled = true;
        document.getElementById('notif-btn').classList.add('on');
        document.getElementById('notif-btn').textContent = '🔔 알림 ON';
        document.getElementById('notif-banner').style.display = 'block';
        setTimeout(() => { document.getElementById('notif-banner').style.display = 'none'; }, 3000);
      }
    });
  } else {
    notifEnabled = false;
    document.getElementById('notif-btn').classList.remove('on');
    document.getElementById('notif-btn').textContent = '🔔 알림 OFF';
  }
}

function sendNotif(symbol, score, change4h, volRatio) {
  if (!notifEnabled) return;
  const key = symbol + '_' + Math.floor(Date.now() / 300000);
  if (lastAlerted[key]) return;
  lastAlerted[key] = true;
  new Notification(`🚀 SQUEEZE HUNT — ${symbol}`, {
    body: `급등 점수 ${score} | 4h +${change4h.toFixed(1)}% | 거래량 ${volRatio.toFixed(1)}x`
  });
}

async function fetchAllSymbols() {
  const r = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
  const d = await r.json();
  return d.symbols
    .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING' && s.contractType === 'PERPETUAL')
    .map(s => s.symbol);
}

async function fetchFundingRates() {
  const r = await fetch('https://fapi.binance.com/fapi/v1/premiumIndex');
  const d = await r.json();
  const map = {};
  d.forEach(x => { map[x.symbol] = parseFloat(x.lastFundingRate); });
  return map;
}

async function fetchKlines(symbol, interval, limit) {
  const r = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
  return await r.json();
}

function calcOBVTrend(candles) {
  if (candles.length < 5) return 0;
  let obv = 0;
  const obvs = [];
  for (let i = 1; i < candles.length; i++) {
    const c = parseFloat(candles[i][4]);
    const p = parseFloat(candles[i-1][4]);
    const v = parseFloat(candles[i][5]);
    if (c > p) obv += v;
    else if (c < p) obv -= v;
    obvs.push(obv);
  }
  const half = Math.floor(obvs.length / 2);
  const early = obvs.slice(0, half).reduce((a,b)=>a+b,0)/half;
  const late = obvs.slice(half).reduce((a,b)=>a+b,0)/(obvs.length-half);
  return late > early ? 1 : late < early ? -1 : 0;
}

function calcVolRatio(candles, recent = 3, baseline = 20) {
  if (candles.length < baseline + recent) return 1;
  const recentVols = candles.slice(-recent).map(c => parseFloat(c[5]));
  const baseVols = candles.slice(-(baseline+recent), -recent).map(c => parseFloat(c[5]));
  const avgRecent = recentVols.reduce((a,b)=>a+b,0) / recent;
  const avgBase = baseVols.reduce((a,b)=>a+b,0) / baseline;
  return avgBase > 0 ? avgRecent / avgBase : 1;
}

function isPullback(candles) {
  if (candles.length < 6) return false;
  const recent = candles.slice(-6);
  const closes = recent.map(c => parseFloat(c[4]));
  const peak = Math.max(...closes.slice(0, -2));
  const last = closes[closes.length - 1];
  const pullPct = (peak - last) / peak * 100;
  return pullPct >= 2 && pullPct <= 25;
}

async function analyzeSymbol(symbol, fundingRate) {
  try {
    const [k1h, k4h] = await Promise.all([
      fetchKlines(symbol, '1h', 48),
      fetchKlines(symbol, '4h', 30)
    ]);

    const closes4h = k4h.map(c => parseFloat(c[4]));
    const closes1h = k1h.map(c => parseFloat(c[4]));
    const price = closes1h[closes1h.length - 1];

    const change4h = closes4h.length >= 2
      ? (closes4h[closes4h.length-1] - closes4h[closes4h.length-2]) / closes4h[closes4h.length-2] * 100 : 0;
    const change1h = closes1h.length >= 2
      ? (closes1h[closes1h.length-1] - closes1h[closes1h.length-2]) / closes1h[closes1h.length-2] * 100 : 0;

    const volRatio1h = calcVolRatio(k1h, 3, 20);
    const volRatio4h = calcVolRatio(k4h, 2, 10);
    const volRatio = Math.max(volRatio1h, volRatio4h);

    const obvTrend = calcOBVTrend(k1h.slice(-20));
    const pullback = isPullback(k4h);

    const volThresh = parseFloat(document.getElementById('vol-thresh').value);
    const chgThresh = parseFloat(document.getElementById('chg-thresh').value);
    const fundThresh = FUND_LEVELS[parseInt(document.getElementById('fund-thresh').value)];

    if (volRatio < volThresh && change4h < chgThresh) return null;
    if (fundingRate < fundThresh) return null;

    let score = 0;
    const signals = [];

    // 1위: 거래량 급증 (40점) — 세력 진입의 직접 증거, 모든 급등의 시작
    if (volRatio >= 15) { score += 40; signals.push('물량폭발'); }
    else if (volRatio >= 10) { score += 32; signals.push('거래량↑↑'); }
    else if (volRatio >= 5)  { score += 22; signals.push('거래량↑'); }
    else if (volRatio >= 3)  { score += 12; }

    // 2위: 4h 가격 급등 (30점) — 거래량 터진 후 가격이 따라오는 것 = 추세 확인
    if (change4h >= 30)      { score += 30; signals.push('4h폭등'); }
    else if (change4h >= 15) { score += 22; signals.push('4h급등'); }
    else if (change4h >= 8)  { score += 14; signals.push('4h상승'); }
    else if (change4h >= 4)  { score += 7; }

    // 3위: 눌림목 (20점) — 1차 급등 후 2~25% 눌림 = 2차 파동 진입 최적 타이밍
    if (pullback) { score += 20; signals.push('눌림목'); }

    // 4위: OBV 상승 (7점) — 후행 지표, 추세 확인 보조용
    if (obvTrend === 1) { score += 7; signals.push('OBV상승'); }

    // 5위: 펀딩비 (3점) — 급등 한참 후에 양전환, 참고용
    if (fundingRate >= 0.001)       { score += 3; signals.push('펀딩↑'); }
    else if (fundingRate >= 0.0003) { score += 2; }
    else if (fundingRate > 0)       { score += 1; }

    return {
      symbol, price, change4h, change1h, volRatio,
      fundingRate, obvTrend, pullback,
      score: Math.min(100, score), signals
    };
  } catch (e) { return null; }
}

function fmtPrice(p) {
  if (p >= 1000) return p.toFixed(1);
  if (p >= 1) return p.toFixed(3);
  if (p >= 0.01) return p.toFixed(5);
  return p.toFixed(7);
}

function fmtPct(v, showPlus = true) {
  const cls = v >= 0 ? 'val-green' : 'val-red';
  const sign = v >= 0 && showPlus ? '+' : '';
  return `<span class="${cls}">${sign}${v.toFixed(2)}%</span>`;
}

function scoreClass(s) {
  if (s >= 90) return 's90';
  if (s >= 70) return 's70';
  if (s >= 50) return 's50';
  return 'slow';
}

function badgeHTML(signals) {
  const map = {
    '물량폭발': 'badge-vol', '거래량↑↑': 'badge-vol', '거래량↑': 'badge-vol',
    'OBV상승': 'badge-obv',
    '4h폭등': 'badge-new', '4h급등': 'badge-new',
    '펀딩↑': 'badge-fund',
    '눌림목': 'badge-float'
  };
  return signals.slice(0, 3).map(s =>
    `<span class="badge ${map[s] || 'badge-vol'}">${s}</span>`
  ).join('');
}

function renderTable(results) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  if (!results.length) {
    document.getElementById('main-table').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('main-table').style.display = 'table';
  document.getElementById('empty').style.display = 'none';

  results.forEach((r, i) => {
    const sc = r.score;
    const rowCls = sc >= 90 ? 'heat-row-90' : sc >= 70 ? 'heat-row-70' : '';
    const entryTag = sc >= 90
      ? '<span style="font-size:9px;color:#f0a030;margin-left:4px">★최적</span>'
      : sc >= 70
        ? '<span style="font-size:9px;color:#c0c030;margin-left:4px">진입▲</span>'
        : '';
    const obvStr = r.obvTrend === 1
      ? '<span class="val-green">↑ 상승</span>'
      : r.obvTrend === -1
        ? '<span class="val-red">↓ 하락</span>'
        : '<span class="val-muted">— 중립</span>';
    const pullStr = r.pullback
      ? '<span class="val-amber">✓ 눌림</span>'
      : '<span class="val-muted">—</span>';
    const fundCls = r.fundingRate > 0.001 ? 'val-red' : r.fundingRate > 0 ? 'val-amber' : 'val-muted';
    const volCls = r.volRatio >= 10 ? 'val-red' : r.volRatio >= 5 ? 'val-amber' : 'val-green';

    const row = document.createElement('tr');
    row.className = rowCls;
    row.innerHTML = `
      <td class="rank">${i+1}</td>
      <td><span class="symbol">${r.symbol.replace('USDT','')}</span><span class="symbol-sub">/USDT</span>${entryTag}</td>
      <td>
        <div class="score-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${sc}%"></div></div>
          <span class="score-num ${scoreClass(sc)}">${sc}</span>
        </div>
      </td>
      <td>${fmtPrice(r.price)}</td>
      <td>${fmtPct(r.change4h)}</td>
      <td>${fmtPct(r.change1h)}</td>
      <td><span class="${volCls}">${r.volRatio.toFixed(1)}x</span></td>
      <td><span class="${fundCls}">${(r.fundingRate*100).toFixed(4)}%</span></td>
      <td>${obvStr}</td>
      <td>${pullStr}</td>
      <td>${badgeHTML(r.signals)}</td>
    `;
    tbody.appendChild(row);
  });
}

async function runScan() {
  setStatus('scanning', '스캔 중...');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main-table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  const fill = document.getElementById('loading-fill');
  const sub = document.getElementById('loading-sub');
  fill.style.width = '5%';

  try {
    sub.textContent = '심볼 목록 로딩...';
    const [symbols, fundingMap] = await Promise.all([fetchAllSymbols(), fetchFundingRates()]);
    document.getElementById('s-total').textContent = symbols.length;
    fill.style.width = '15%';

    const BATCH = 6;
    const results = [];
    let processed = 0;

    for (let i = 0; i < symbols.length; i += BATCH) {
      const batch = symbols.slice(i, i + BATCH);
      sub.textContent = `분석 중... ${Math.min(i+BATCH, symbols.length)}/${symbols.length}`;
      const res = await Promise.all(batch.map(s => analyzeSymbol(s, fundingMap[s] ?? 0)));
      res.forEach(r => { if (r) results.push(r); });
      processed += batch.length;
      fill.style.width = Math.min(90, 15 + (processed / symbols.length) * 75) + '%';
      await new Promise(r => setTimeout(r, 60));
    }

    results.sort((a, b) => b.score - a.score);

    const topN = parseInt(document.getElementById('top-n').value);
    const top = results.slice(0, topN);

    document.getElementById('s-vol').textContent = results.length;
    document.getElementById('s-cand').textContent = top.length;
    document.getElementById('s-hot').textContent = top.filter(r => r.score >= 70).length;

    const now = new Date();
    document.getElementById('s-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');

    fill.style.width = '100%';
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 200);
    renderTable(top);
    setStatus('active', `${top.length}개 결과`);

    top.slice(0, 5).forEach(r => {
      if (r.score >= 70) sendNotif(r.symbol, r.score, r.change4h, r.volRatio);
    });

  } catch(e) {
    setStatus('idle', '오류');
    sub.textContent = '오류: ' + e.message;
    console.error(e);
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('dot');
  dot.className = state === 'scanning' ? 'scanning' : state === 'active' ? 'active' : '';
  document.getElementById('status-text').textContent = text;
}

function scheduleNext() {
  const now = new Date();
  const next = new Date(now);
  const m = now.getMinutes();
  const nextM = Math.ceil((m + 1) / 15) * 15;
  if (nextM >= 60) {
    next.setHours(next.getHours() + 1);
    next.setMinutes(0, 30, 0);
  } else {
    next.setMinutes(nextM, 30, 0);
  }
  if (next <= now) {
    next.setMinutes(next.getMinutes() + 15);
  }
  const diff = next - now;

  if (countdownId) clearTimeout(countdownId);
  countdownId = setTimeout(() => { runScan(); setTimeout(scheduleNext, 2000); }, diff);

  if (tickId) clearInterval(tickId);
  tickId = setInterval(() => {
    const rem = Math.max(0, next - new Date());
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    document.getElementById('next-scan').textContent = `다음: ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if (rem <= 0) clearInterval(tickId);
  }, 1000);
}

document.addEventListener('DOMContentLoaded', () => { runScan(); scheduleNext(); });
</script>
