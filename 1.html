<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>최대 레버리지 계산기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #050810; color: #c8d4e8; min-height: 100vh; padding: 24px 16px; }
h1 { font-size: 17px; font-weight: 700; color: #e8f0ff; margin-bottom: 4px; }
.sub { font-size: 11px; color: #4a5a7a; font-family: monospace; margin-bottom: 24px; }
.card { background: #0a0f1e; border: 1px solid #1a2340; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
.card-title { font-size: 11px; font-weight: 700; color: #4a5a7a; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
.row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
label { font-size: 11px; color: #4a5a7a; }
input { background: #050810; border: 1px solid #1a2340; border-radius: 6px; color: #e8f0ff; font-size: 14px; padding: 9px 12px; outline: none; width: 100%; transition: border-color .15s; font-family: monospace; }
input:focus { border-color: #378add; }
input::placeholder { color: #2a3a5a; }
.btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn-fetch { background: linear-gradient(90deg,#378add,#00c6f5); color: #fff; }
.btn-fetch:hover { filter: brightness(1.1); }
.btn-fetch:disabled { opacity: .5; cursor: not-allowed; }
.btn-calc { background: linear-gradient(90deg,#00e87a,#00c6f5); color: #000; margin-top: 12px; }
.btn-calc:hover { filter: brightness(1.08); }
.loading { display: none; text-align: center; padding: 12px; font-size: 12px; color: #4a5a7a; font-family: monospace; }
.loading.show { display: block; }
.blink { animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
.err { color: #ff4560; font-size: 12px; margin-top: 8px; display: none; padding: 8px 12px; background: rgba(255,69,96,.08); border-radius: 6px; border: 1px solid rgba(255,69,96,.2); }
.err.show { display: block; }
.hidden { display: none; }
.show-block { display: block; }
.fetched-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.fi { background: #050810; border-radius: 6px; padding: 10px 12px; }
.fi-label { font-size: 10px; color: #4a5a7a; margin-bottom: 4px; }
.fi-value { font-size: 13px; font-weight: 700; font-family: monospace; }
.dir-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
.dir-btn { padding: 10px; border-radius: 8px; border: 1px solid #1a2340; background: transparent; color: #4a5a7a; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; }
.dir-btn.long.active { background: rgba(0,232,122,.12); color: #00e87a; border-color: #00e87a; }
.dir-btn.short.active { background: rgba(255,69,96,.12); color: #ff4560; border-color: #ff4560; }
.result-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 12px; }
.metric { background: #050810; border-radius: 8px; padding: 12px 14px; }
.metric-label { font-size: 10px; color: #4a5a7a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
.metric-value { font-size: 22px; font-weight: 700; }
.metric-sub { font-size: 10px; color: #4a5a7a; margin-top: 3px; font-family: monospace; }
.formula-box { background: #050810; border-radius: 8px; padding: 12px 14px; font-family: monospace; font-size: 11px; color: #4a5a7a; line-height: 2.0; }
.formula-box b { color: #c8d4e8; }
.warn-box { background: rgba(255,69,96,.06); border: 1px solid rgba(255,69,96,.2); border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #ff7a8a; margin-top: 10px; line-height: 1.7; }
.hist-item { background: #050810; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.hist-sym { color: #e8f0ff; font-weight: 700; font-size: 13px; }
.hist-detail { color: #4a5a7a; font-size: 10px; font-family: monospace; margin-top: 2px; }
</style>
</head>
<body>

<h1>최대 레버리지 계산기</h1>
<p class="sub">심볼 입력 → 바이낸스 API로 현재가 · 역대 최저가 · 역대 최고가 자동 조회 후 계산</p>

<div class="card">
  <div class="card-title">심볼 입력</div>
  <div class="row">
    <div class="field">
      <label>심볼 (USDT 무기한 선물)</label>
      <input type="text" id="sym" placeholder="예: BTC 또는 BTCUSDT" oninput="this.value=this.value.toUpperCase().replace(/USDT$/,'')" onkeydown="if(event.key==='Enter')fetchData()">
    </div>
    <div class="field">
      <label>레버리지 버퍼 (%)</label>
      <input type="number" id="buffer" value="20" min="0" max="50" step="1">
    </div>
  </div>
  <button class="btn btn-fetch" id="btnFetch" onclick="fetchData()">데이터 조회</button>
  <div class="loading" id="loading"><span class="blink">바이낸스에서 데이터 조회 중...</span></div>
  <p class="err" id="errMsg"></p>
</div>

<div class="card hidden" id="fetchedCard">
  <div class="card-title">조회 결과 — <span id="fetchedSym" style="color:#e8f0ff"></span></div>
  <div class="fetched-row">
    <div class="fi">
      <div class="fi-label">현재가</div>
      <div class="fi-value" id="fPrice" style="color:#e8f0ff">—</div>
    </div>
    <div class="fi">
      <div class="fi-label">역대 최저가 (1M봉)</div>
      <div class="fi-value" id="fLow" style="color:#00e87a">—</div>
    </div>
    <div class="fi">
      <div class="fi-label">역대 최고가 (1M봉)</div>
      <div class="fi-value" id="fHigh" style="color:#ff4560">—</div>
    </div>
  </div>

  <div class="card-title">포지션 방향 선택</div>
  <div class="dir-row">
    <button class="dir-btn long active" id="btnLong" onclick="setDir('LONG')">🟢 롱 — 역대 최저가 기준</button>
    <button class="dir-btn short" id="btnShort" onclick="setDir('SHORT')">🔴 숏 — 역대 최고가 기준</button>
  </div>
  <button class="btn btn-calc" onclick="calc()">최대 레버리지 계산</button>
</div>

<div class="card hidden" id="resultCard">
  <div class="card-title">계산 결과 — <span id="resLabel"></span></div>
  <div class="result-grid">
    <div class="metric">
      <div class="metric-label">권장 최대 레버리지</div>
      <div class="metric-value" id="resLev">—</div>
      <div class="metric-sub" id="resTheo">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="resLiqLabel">청산가</div>
      <div class="metric-value" id="resLiq" style="color:#ff4560">—</div>
      <div class="metric-sub" id="resLiqSub">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="resExtLabel">역대 극값</div>
      <div class="metric-value" id="resExtreme">—</div>
      <div class="metric-sub" id="resMovePct">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">진입가 (현재가)</div>
      <div class="metric-value" id="resEntry" style="color:#e8f0ff">—</div>
      <div class="metric-sub">유지마진율 0.5%</div>
    </div>
  </div>
  <div class="formula-box" id="formulaBox"></div>
  <div class="warn-box" id="warnBox"></div>
</div>

<div class="card hidden" id="histCard">
  <div class="card-title">계산 히스토리</div>
  <div id="histList"></div>
</div>

<script>
const BASE = 'https://fapi.binance.com';
let dir = 'LONG';
let fetched = null;
const hist = [];

function fp(v) {
  if (v == null) return '—';
  if (v >= 10000)  return v.toLocaleString('ko-KR', {maximumFractionDigits: 0});
  if (v >= 100)    return v.toFixed(2);
  if (v >= 1)      return v.toFixed(4);
  if (v >= 0.0001) return v.toFixed(6);
  return v.toFixed(8);
}
function showErr(m) { const e=document.getElementById('errMsg'); e.textContent=m; e.classList.add('show'); }
function clearErr()  { document.getElementById('errMsg').classList.remove('show'); }
function show(id)    { document.getElementById(id).classList.remove('hidden'); }
function hide(id)    { document.getElementById(id).classList.add('hidden'); }

function setDir(d) {
  dir = d;
  document.getElementById('btnLong').className  = 'dir-btn long'  + (d==='LONG'  ? ' active' : '');
  document.getElementById('btnShort').className = 'dir-btn short' + (d==='SHORT' ? ' active' : '');
}

async function fetchData() {
  clearErr();
  const raw = document.getElementById('sym').value.trim();
  if (!raw) return showErr('심볼을 입력해주세요.');
  const sym = raw.toUpperCase().replace(/USDT$/, '') + 'USDT';

  document.getElementById('btnFetch').disabled = true;
  document.getElementById('loading').classList.add('show');
  hide('fetchedCard'); hide('resultCard');

  try {
    // 현재가 조회
    const priceRes = await fetch(`${BASE}/fapi/v1/ticker/price?symbol=${sym}`);
    if (!priceRes.ok) {
      const e = await priceRes.json().catch(() => ({}));
      throw new Error(e.msg || `'${sym}' 심볼을 찾을 수 없습니다. 심볼명을 확인해주세요.`);
    }
    const priceData = await priceRes.json();

    // 1M봉 조회 (전체 — limit 1500)
    const klinesRes = await fetch(`${BASE}/fapi/v1/klines?symbol=${sym}&interval=1M&limit=1500`);
    if (!klinesRes.ok) throw new Error('1M봉 데이터 조회 실패');
    const klines = await klinesRes.json();

    if (!klines || klines.length < 1) throw new Error('1M봉 데이터가 없습니다.');

    const price     = parseFloat(priceData.price);
    // 현재 진행 중인 캔들 포함 전체에서 최저/최고 추출
    const allLow  = Math.min(...klines.map(k => parseFloat(k[3])));
    const allHigh = Math.max(...klines.map(k => parseFloat(k[2])));
    const months  = klines.length;

    fetched = { sym, price, allLow, allHigh, months };

    document.getElementById('fetchedSym').textContent = sym;
    document.getElementById('fPrice').textContent = '$' + fp(price);
    document.getElementById('fLow').textContent   = '$' + fp(allLow)  + ' (' + months + '개월)';
    document.getElementById('fHigh').textContent  = '$' + fp(allHigh) + ' (' + months + '개월)';

    show('fetchedCard');
    document.getElementById('fetchedCard').scrollIntoView({behavior:'smooth',block:'nearest'});

  } catch(e) {
    showErr(e.message || '조회 중 오류 발생');
  } finally {
    document.getElementById('btnFetch').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

function calc() {
  if (!fetched) return;
  clearErr();

  const buffer  = parseFloat(document.getElementById('buffer').value) / 100;
  const MMR     = 0.005;
  const isLong  = dir === 'LONG';
  const { sym, price, allLow, allHigh, months } = fetched;
  const entry   = price;
  const extreme = isLong ? allLow : allHigh;

  if (isLong  && extreme >= entry) return showErr('역대 최저가가 현재가 이상입니다. 데이터를 확인해주세요.');
  if (!isLong && extreme <= entry) return showErr('역대 최고가가 현재가 이하입니다. 데이터를 확인해주세요.');

  const movePct     = Math.abs(entry - extreme) / entry;
  const theoretical = 1 / (movePct + MMR);
  const recLev      = Math.max(1, Math.min(Math.floor(theoretical * (1 - buffer)), 125));
  const liq         = isLong
    ? entry * (1 - 1/recLev + MMR)
    : entry * (1 + 1/recLev - MMR);

  document.getElementById('resLabel').textContent    = sym + ' · ' + dir;
  document.getElementById('resLabel').style.color    = isLong ? '#00e87a' : '#ff4560';
  document.getElementById('resLev').textContent      = recLev + '배';
  document.getElementById('resLev').style.color      = recLev >= 50 ? '#ff4560' : recLev >= 20 ? '#ff9020' : '#00c6f5';
  document.getElementById('resTheo').textContent     = '이론최대 ' + theoretical.toFixed(1) + '배 × 버퍼 ' + (buffer*100).toFixed(0) + '%';
  document.getElementById('resLiqLabel').textContent = isLong ? '청산가 (롱)' : '청산가 (숏)';
  document.getElementById('resLiq').textContent      = '$' + fp(liq);
  document.getElementById('resLiqSub').textContent   = isLong ? '이 가격 아래 → 청산' : '이 가격 위 → 청산';
  document.getElementById('resExtLabel').textContent = isLong ? '역대 최저가' : '역대 최고가';
  document.getElementById('resExtreme').textContent  = '$' + fp(extreme);
  document.getElementById('resExtreme').style.color  = isLong ? '#00e87a' : '#ff4560';
  document.getElementById('resMovePct').textContent  = '진입가 대비 ' + (movePct*100).toFixed(2) + '% ' + (isLong ? '하락' : '상승') + ' · ' + months + '개월';
  document.getElementById('resEntry').textContent    = '$' + fp(entry);

  document.getElementById('formulaBox').innerHTML =
    '<b>계산 과정</b><br>' +
    '변동률 = |' + fp(entry) + ' - ' + fp(extreme) + '| / ' + fp(entry) + ' = <b>' + (movePct*100).toFixed(4) + '%</b><br>' +
    '이론최대 = 1 / (' + (movePct*100).toFixed(4) + '% + MMR 0.5%) = <b>' + theoretical.toFixed(2) + '배</b><br>' +
    '버퍼 적용 = ' + theoretical.toFixed(2) + ' × ' + ((1-buffer)*100).toFixed(0) + '% → 소수점 버림 = <b>' + recLev + '배</b><br>' +
    '청산가 = ' + fp(entry) + ' × (1 ' + (isLong ? '-' : '+') + ' 1/' + recLev + ' + 0.5%) = <b>$' + fp(liq) + '</b>';

  document.getElementById('warnBox').textContent = '⚠ ' + (
    recLev >= 50 ? recLev + '배는 매우 고위험입니다. 소액으로만 활용하고 손절라인을 반드시 설정하세요.' :
    recLev >= 20 ? recLev + '배 레버리지는 변동성에 민감합니다. 리스크 관리를 철저히 하세요.' :
    '이 레버리지는 역대 극값까지 버틸 수 있는 이론값입니다. 실제로는 추가 안전마진을 두세요.'
  );

  show('resultCard');

  hist.unshift({ sym, dir, entry, extreme, recLev, liq, movePct, months, buf: (buffer*100).toFixed(0) });
  if (hist.length > 10) hist.pop();
  show('histCard');
  document.getElementById('histList').innerHTML = hist.map(h => {
    const il = h.dir === 'LONG';
    return '<div class="hist-item">' +
      '<div>' +
        '<div class="hist-sym">' + h.sym + ' <span style="color:' + (il?'#00e87a':'#ff4560') + ';font-size:10px;font-weight:400">' + h.dir + '</span></div>' +
        '<div class="hist-detail">진입 $' + fp(h.entry) + ' · ' + (il?'최저':'최고') + ' $' + fp(h.extreme) + ' · ' + (h.movePct*100).toFixed(1) + '% · ' + h.months + '개월 · 버퍼' + h.buf + '%</div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<div style="font-size:16px;font-weight:700;font-family:monospace;color:' + (il?'#00e87a':'#ff4560') + '">' + h.recLev + '배</div>' +
        '<div style="font-size:10px;color:#4a5a7a;font-family:monospace">청산 $' + fp(h.liq) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'nearest'});
}
</script>
</body>
</html>
