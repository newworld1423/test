<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAR SCAN — Binance USDT Futures</title>
<style>
  :root {
    --bg: #0a0d12;
    --bg2: #0f1318;
    --bg3: #151a22;
    --border: #1e2730;
    --border2: #2a3545;
    --text: #d4dce8;
    --muted: #5a7290;
    --accent: #e05a5a;
    --accent2: #c44040;
    --green: #3fa87a;
    --amber: #d4883a;
    --blue: #4a8fc4;
    --font: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    min-height: 100vh;
  }
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .logo span { color: var(--muted); font-size: 11px; letter-spacing: 1px; }
  #status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
  }
  #dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #dot.scanning { background: var(--amber); }
  #header-right { display: flex; align-items: center; gap: 10px; }
  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.on { border-color: var(--green); color: var(--green); }
  #next-scan {
    font-size: 11px;
    color: var(--muted);
    min-width: 90px;
    text-align: right;
  }
  #stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 0 20px;
  }
  .stat {
    padding: 8px 20px 8px 0;
    margin-right: 20px;
    border-right: 1px solid var(--border);
    font-size: 11px;
  }
  .stat:last-child { border-right: none; }
  .stat-label { color: var(--muted); margin-bottom: 2px; }
  .stat-val { color: var(--text); font-size: 13px; }
  #table-wrap {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }
  thead th {
    background: var(--bg3);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
    font-weight: normal;
  }
  thead th:first-child { text-align: left; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--bg3); }
  td {
    padding: 8px 12px;
    text-align: right;
    white-space: nowrap;
    font-size: 11px;
  }
  td:first-child { text-align: left; }
  .rank { color: var(--muted); font-size: 10px; width: 30px; }
  .symbol { color: var(--text); font-size: 12px; font-weight: bold; letter-spacing: 0.5px; }
  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
  }
  .score-bar {
    width: 60px;
    height: 5px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.3s;
  }
  .score-num {
    min-width: 28px;
    font-size: 12px;
    font-weight: bold;
  }
  .score-90 { color: #e05a5a; }
  .score-70 { color: #d4883a; }
  .score-50 { color: #c4b040; }
  .score-low { color: #5a7290; }
  .val-red { color: #e05a5a; }
  .val-green { color: #3fa87a; }
  .val-muted { color: var(--muted); }
  .funding-pos { color: #e05a5a; }
  .funding-neg { color: #3fa87a; }
  .signal-badge {
    display: inline-block;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.5px;
    background: rgba(224, 90, 90, 0.15);
    color: var(--accent);
    border: 1px solid rgba(224, 90, 90, 0.3);
  }
  .signal-badge.w { background: rgba(212, 136, 58, 0.15); color: var(--amber); border-color: rgba(212, 136, 58, 0.3); }
  #loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
  }
  #loading-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    margin: 16px auto 0;
    overflow: hidden;
    border-radius: 1px;
  }
  #loading-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }
  #notif-banner {
    background: rgba(63, 168, 122, 0.12);
    border: 1px solid rgba(63, 168, 122, 0.3);
    color: #3fa87a;
    font-size: 11px;
    padding: 8px 20px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  #alert-banner {
    background: rgba(224, 90, 90, 0.1);
    border-bottom: 1px solid rgba(224, 90, 90, 0.2);
    color: var(--accent);
    font-size: 11px;
    padding: 6px 20px;
    display: none;
  }
  .score-col { min-width: 110px; }
  #empty { text-align: center; padding: 40px; color: var(--muted); letter-spacing: 1px; }
  .atr-tp { color: var(--green); }
  .atr-sl { color: var(--accent); }
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <div class="logo">BEAR SCAN <span>// USDT PERP</span></div>
    <div id="status">
      <span id="dot"></span>
      <span id="status-text">대기중</span>
    </div>
  </div>
  <div id="header-right">
    <div id="next-scan">--:--</div>
    <button class="ctrl-btn" id="notif-btn" onclick="toggleNotif()">🔔 알림 OFF</button>
    <button class="ctrl-btn" onclick="runScan()">▶ 지금 스캔</button>
  </div>
</div>

<div id="notif-banner">✓ 브라우저 알림이 허용되었습니다. 상위 신호 발생 시 알림을 받습니다.</div>
<div id="alert-banner" id="alert-banner"></div>

<div id="stats-bar">
  <div class="stat">
    <div class="stat-label">스캔 종목</div>
    <div class="stat-val" id="s-total">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">필터 후 (펀딩+)</div>
    <div class="stat-val" id="s-filtered">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">고위험 (≥70)</div>
    <div class="stat-val" id="s-high">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">마지막 스캔</div>
    <div class="stat-val" id="s-time">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">다음 정각 스캔</div>
    <div class="stat-val" id="s-next">—</div>
  </div>
</div>

<div id="table-wrap">
  <div id="loading">
    INITIALIZING...
    <div id="loading-bar"><div id="loading-fill"></div></div>
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th style="text-align:left">#</th>
        <th style="text-align:left">심볼</th>
        <th class="score-col">하락 점수</th>
        <th>가격</th>
        <th>변화율 (1h)</th>
        <th>RSI (15m)</th>
        <th>볼린저 위치</th>
        <th>펀딩비</th>
        <th>거래량 비율</th>
        <th>ATR TP (0.5x)</th>
        <th>ATR SL (1x)</th>
        <th>신호</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" style="display:none">양수 펀딩비 + 하락 조건을 만족하는 종목이 없습니다.</div>
</div>

<script>
let notifEnabled = false;
let notifPermission = false;
let lastTopSymbol = null;
let scanIntervalId = null;
let countdownId = null;

function toggleNotif() {
  if (!notifEnabled) {
    if (Notification.permission === 'granted') {
      notifEnabled = true;
      notifPermission = true;
      document.getElementById('notif-btn').classList.add('on');
      document.getElementById('notif-btn').textContent = '🔔 알림 ON';
      showNotifBanner();
    } else {
      Notification.requestPermission().then(p => {
        if (p === 'granted') {
          notifEnabled = true;
          notifPermission = true;
          document.getElementById('notif-btn').classList.add('on');
          document.getElementById('notif-btn').textContent = '🔔 알림 ON';
          showNotifBanner();
        } else {
          alert('브라우저 설정에서 알림을 허용해주세요.');
        }
      });
    }
  } else {
    notifEnabled = false;
    document.getElementById('notif-btn').classList.remove('on');
    document.getElementById('notif-btn').textContent = '🔔 알림 OFF';
  }
}

function showNotifBanner() {
  const b = document.getElementById('notif-banner');
  b.style.display = 'flex';
  setTimeout(() => { b.style.display = 'none'; }, 4000);
}

function sendNotif(title, body) {
  if (!notifEnabled || !notifPermission) return;
  try {
    new Notification(title, { body, icon: '' });
  } catch(e) {}
}

async function fetchAllSymbols() {
  const r = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
  const d = await r.json();
  return d.symbols
    .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING' && s.contractType === 'PERPETUAL')
    .map(s => s.symbol);
}

async function fetchFundingRates(symbols) {
  const r = await fetch('https://fapi.binance.com/fapi/v1/premiumIndex');
  const d = await r.json();
  const map = {};
  d.forEach(x => { map[x.symbol] = parseFloat(x.lastFundingRate); });
  return map;
}

async function fetchTickers() {
  const r = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
  const d = await r.json();
  const map = {};
  d.forEach(x => { map[x.symbol] = x; });
  return map;
}

async function fetchKlines(symbol, interval, limit) {
  const r = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
  return await r.json();
}

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff > 0) gains += diff;
    else losses -= diff;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    const g = diff > 0 ? diff : 0;
    const l = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (period - 1) + g) / period;
    avgLoss = (avgLoss * (period - 1) + l) / period;
  }
  if (avgLoss === 0) return 100;
  return 100 - 100 / (1 + avgGain / avgLoss);
}

function calcBB(closes, period = 20) {
  if (closes.length < period) return null;
  const slice = closes.slice(-period);
  const mean = slice.reduce((a, b) => a + b, 0) / period;
  const std = Math.sqrt(slice.reduce((a, b) => a + (b - mean) ** 2, 0) / period);
  const upper = mean + 2 * std;
  const lower = mean - 2 * std;
  const last = closes[closes.length - 1];
  const pos = std === 0 ? 0.5 : (last - lower) / (upper - lower);
  return { upper, lower, mid: mean, pos: Math.max(0, Math.min(1, pos)) };
}

function calcATR(candles, period = 14) {
  if (candles.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < candles.length; i++) {
    const high = parseFloat(candles[i][2]);
    const low = parseFloat(candles[i][3]);
    const prevClose = parseFloat(candles[i-1][4]);
    trs.push(Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose)));
  }
  let atr = trs.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < trs.length; i++) {
    atr = (atr * (period - 1) + trs[i]) / period;
  }
  return atr;
}

function calcOBVDivergence(candles) {
  if (candles.length < 10) return 0;
  const recent = candles.slice(-10);
  let obv = 0;
  const obvs = [];
  for (let i = 1; i < recent.length; i++) {
    const close = parseFloat(recent[i][4]);
    const prevClose = parseFloat(recent[i-1][4]);
    const vol = parseFloat(recent[i][5]);
    if (close > prevClose) obv += vol;
    else if (close < prevClose) obv -= vol;
    obvs.push(obv);
  }
  const prices = recent.slice(1).map(c => parseFloat(c[4]));
  const priceUp = prices[prices.length-1] > prices[0];
  const obvDown = obvs[obvs.length-1] < obvs[0];
  if (priceUp && obvDown) return 1;
  return 0;
}

async function analyzeSymbol(symbol, fundingRate, ticker) {
  try {
    const [k15m, k1h] = await Promise.all([
      fetchKlines(symbol, '15m', 50),
      fetchKlines(symbol, '1h', 20)
    ]);

    const closes15 = k15m.map(c => parseFloat(c[4]));
    const closes1h = k1h.map(c => parseFloat(c[4]));
    const price = closes15[closes15.length - 1];

    const rsi = calcRSI(closes15, 14);
    const bb = calcBB(closes15, 20);
    const atr = calcATR(k15m, 14);
    const obvDiv = calcOBVDivergence(k15m);

    const priceChange1h = closes1h.length >= 2
      ? (closes1h[closes1h.length-1] - closes1h[closes1h.length-2]) / closes1h[closes1h.length-2] * 100
      : 0;

    const baseVol = parseFloat(ticker?.volume ?? 0);
    const lastVol = parseFloat(k15m[k15m.length-1][5]);
    const avgVol = k15m.slice(-20).reduce((a, c) => a + parseFloat(c[5]), 0) / 20;
    const volRatio = avgVol > 0 ? lastVol / avgVol : 1;

    let score = 0;
    const signals = [];

    // 1위: 펀딩비 (35점) — 롱 과열의 직접 증거, 청산 압력의 원인
    if (fundingRate >= 0.001) { score += 35; signals.push('펀딩↑↑'); }
    else if (fundingRate >= 0.0005) { score += 22; signals.push('펀딩↑'); }
    else if (fundingRate > 0) { score += 10; }

    // 2위: OBV 다이버전스 (25점) — 가격 오르는데 매수세 빠짐 = 반전 근거
    if (obvDiv) { score += 25; signals.push('OBV이탈'); }

    // 3위: 볼린저밴드 상단 (20점) — 통계적 과매수 위치
    if (bb !== null) {
      if (bb.pos >= 0.9) { score += 20; signals.push('BB상단'); }
      else if (bb.pos >= 0.75) { score += 12; }
      else if (bb.pos >= 0.6) { score += 5; }
    }

    // 4위: 거래량 급증 + 급등 조합 (15점) — 과열의 확인 신호
    if (priceChange1h >= 3 && volRatio >= 2.0) { score += 15; signals.push('급등+물량'); }
    else if (priceChange1h >= 3) { score += 9; signals.push('급등'); }
    else if (priceChange1h >= 1.5 && volRatio >= 1.5) { score += 6; }
    else if (priceChange1h >= 1.5) { score += 4; }
    else if (volRatio >= 2.5) { score += 4; }

    // 5위: RSI (5점) — 후행 지표, 보조 역할만
    if (rsi !== null) {
      if (rsi >= 75) { score += 5; signals.push('RSI과매수'); }
      else if (rsi >= 65) { score += 3; }
    }

    const tp = atr ? price - atr * 0.5 : null;
    const sl = atr ? price + atr * 1.0 : null;

    return {
      symbol, price, rsi, bb, atr, priceChange1h,
      volRatio, fundingRate, score: Math.min(100, score),
      signals, tp, sl
    };
  } catch (e) {
    return null;
  }
}

function scoreClass(s) {
  if (s >= 70) return 'score-90';
  if (s >= 55) return 'score-70';
  if (s >= 40) return 'score-50';
  return 'score-low';
}

function fmtPrice(p) {
  if (p >= 1000) return p.toFixed(1);
  if (p >= 1) return p.toFixed(3);
  if (p >= 0.01) return p.toFixed(5);
  return p.toFixed(7);
}

function fmtPct(v) {
  const c = v >= 0 ? 'val-green' : 'val-red';
  return `<span class="${c}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
}

function renderTable(results) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  if (!results.length) {
    document.getElementById('main-table').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('main-table').style.display = 'table';
  document.getElementById('empty').style.display = 'none';

  results.forEach((r, i) => {
    const sc = r.score;
    const scCls = scoreClass(sc);
    const fillW = sc;

    const bbStr = r.bb ? (r.bb.pos * 100).toFixed(0) + '%' : '—';
    const rsiStr = r.rsi ? r.rsi.toFixed(1) : '—';
    const rsiCls = r.rsi >= 70 ? 'val-red' : r.rsi >= 50 ? 'val-muted' : 'val-green';

    const fundStr = (r.fundingRate * 100).toFixed(4) + '%';
    const fundCls = r.fundingRate > 0 ? 'funding-pos' : 'funding-neg';

    const volStr = r.volRatio.toFixed(1) + 'x';
    const volCls = r.volRatio >= 2 ? 'val-red' : r.volRatio >= 1.3 ? 'val-muted' : '';

    const tpStr = r.tp ? `<span class="atr-tp">${fmtPrice(r.tp)}</span>` : '—';
    const slStr = r.sl ? `<span class="atr-sl">${fmtPrice(r.sl)}</span>` : '—';

    const sigs = r.signals.slice(0, 2).map(s =>
      `<span class="signal-badge ${s === '급등' || s === '펀딩↑↑' ? 'w' : ''}">${s}</span>`
    ).join(' ');

    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="rank">${i + 1}</td>
      <td class="symbol">${r.symbol.replace('USDT', '')}<span style="color:var(--muted);font-size:9px">/USDT</span></td>
      <td>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${fillW}%"></div></div>
          <span class="score-num ${scCls}">${sc}</span>
        </div>
      </td>
      <td>${fmtPrice(r.price)}</td>
      <td>${fmtPct(r.priceChange1h)}</td>
      <td><span class="${rsiCls}">${rsiStr}</span></td>
      <td>${bbStr}</td>
      <td><span class="${fundCls}">${fundStr}</span></td>
      <td><span class="${volCls}">${volStr}</span></td>
      <td>${tpStr}</td>
      <td>${slStr}</td>
      <td>${sigs}</td>
    `;
    tbody.appendChild(row);
  });
}

async function runScan() {
  setStatus('scanning', '스캔 중...');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main-table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';

  const fill = document.getElementById('loading-fill');
  fill.style.width = '10%';

  try {
    const [symbols, fundingMap, tickerMap] = await Promise.all([
      fetchAllSymbols(),
      fetchFundingRates(),
      fetchTickers()
    ]);

    document.getElementById('s-total').textContent = symbols.length;
    fill.style.width = '20%';

    const posSymbols = symbols.filter(s => (fundingMap[s] ?? 0) > 0);
    document.getElementById('s-filtered').textContent = posSymbols;

    const BATCH = 8;
    const results = [];
    for (let i = 0; i < posSymbols.length; i += BATCH) {
      const batch = posSymbols.slice(i, i + BATCH);
      const res = await Promise.all(
        batch.map(s => analyzeSymbol(s, fundingMap[s] ?? 0, tickerMap[s]))
      );
      res.forEach(r => { if (r) results.push(r); });
      fill.style.width = Math.min(90, 20 + (i / posSymbols.length) * 70) + '%';
      await new Promise(r => setTimeout(r, 80));
    }

    results.sort((a, b) => b.score - a.score);
    const top = results.slice(0, 50);

    const highRisk = top.filter(r => r.score >= 70);
    document.getElementById('s-high').textContent = highRisk.length;

    const now = new Date();
    document.getElementById('s-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');

    fill.style.width = '100%';
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 300);

    renderTable(top);
    setStatus('active', `${top.length}개 결과`);

    if (top.length && notifEnabled) {
      const best = top[0];
      if (best.score >= 65 && best.symbol !== lastTopSymbol) {
        lastTopSymbol = best.symbol;
        sendNotif(
          `📉 BEAR SCAN — ${best.symbol}`,
          `하락 점수 ${best.score} | RSI ${best.rsi?.toFixed(1)} | 펀딩비 ${(best.fundingRate*100).toFixed(4)}%`
        );
      }
    }

    if (highRisk.length >= 3) {
      const ab = document.getElementById('alert-banner');
      ab.style.display = 'block';
      ab.textContent = `⚠ 고위험 종목 ${highRisk.length}개 발견 — ${highRisk.slice(0,3).map(r=>r.symbol.replace('USDT','')).join(', ')} 외`;
    } else {
      document.getElementById('alert-banner').style.display = 'none';
    }

  } catch (e) {
    setStatus('idle', '오류 발생');
    document.getElementById('loading').innerHTML = `오류: ${e.message}<div id="loading-bar"><div id="loading-fill"></div></div>`;
    console.error(e);
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('dot');
  dot.className = state === 'scanning' ? 'scanning' : state === 'active' ? 'active' : '';
  document.getElementById('status-text').textContent = text;
}

function scheduleNextHour() {
  const now = new Date();
  const next = new Date(now);
  next.setMinutes(0, 30, 0);
  if (next <= now) next.setHours(next.getHours() + 1);
  const diff = next - now;

  document.getElementById('s-next').textContent =
    next.getHours().toString().padStart(2,'0') + ':' +
    next.getMinutes().toString().padStart(2,'0') + ':' +
    next.getSeconds().toString().padStart(2,'0');

  if (countdownId) clearTimeout(countdownId);
  countdownId = setTimeout(() => {
    runScan();
    setTimeout(scheduleNextHour, 2000);
  }, diff);

  startCountdown(next);
}

function startCountdown(target) {
  if (scanIntervalId) clearInterval(scanIntervalId);
  scanIntervalId = setInterval(() => {
    const rem = Math.max(0, target - new Date());
    const h = Math.floor(rem / 3600000);
    const m = Math.floor((rem % 3600000) / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    document.getElementById('next-scan').textContent =
      `다음: ${h > 0 ? h + 'h ' : ''}${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if (rem <= 0) clearInterval(scanIntervalId);
  }, 1000);
}

document.addEventListener('DOMContentLoaded', () => {
  runScan();
  scheduleNextHour();
});
</script>
