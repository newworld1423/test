<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>추세 추종 스캐너 — Binance Futures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --bg2: #111318;
    --bg3: #181b22;
    --bg4: #1e222c;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555a6e;
    --green: #00d68f;
    --green-dim: rgba(0,214,143,0.12);
    --green-mid: rgba(0,214,143,0.25);
    --red: #ff5c5c;
    --red-dim: rgba(255,92,92,0.1);
    --red-mid: rgba(255,92,92,0.22);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.1);
    --blue: #4e9eff;
    --blue-dim: rgba(78,158,255,0.12);
    --accent: #00d68f;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid lines background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    border: 1px solid var(--green);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green-dim);
  }
  .logo-icon svg { position: relative; z-index: 1; }
  .logo-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    color: var(--text2);
    background: var(--bg2);
  }
  .pill.live { border-color: var(--green); color: var(--green); background: var(--green-dim); animation: pulse-border 2s infinite; }
  @keyframes pulse-border { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* ── controls ── */
  .controls-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .ctrl-group { display: flex; gap: 4px; }

  .seg-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .seg-btn:hover { background: var(--bg3); color: var(--text); }
  .seg-btn.active { background: var(--bg4); color: var(--text); border-color: var(--border2); }

  .tf-btn { font-size: 12px; }
  .tf-btn.active { color: var(--green); border-color: var(--green); background: var(--green-dim); }

  .sep { width: 1px; height: 24px; background: var(--border2); }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--green); }

  .auto-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }

  .auto-label { font-size: 12px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; }

  .toggle {
    position: relative; width: 40px; height: 22px; cursor: pointer;
    background: var(--bg3); border-radius: 11px; border: 1px solid var(--border2);
    transition: all 0.2s;
  }
  .toggle.on { background: var(--green-dim); border-color: var(--green); }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--text3); transition: all 0.2s;
  }
  .toggle.on::after { left: 21px; background: var(--green); }

  .scan-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600;
    padding: 7px 18px;
    border-radius: 6px;
    border: 1px solid var(--green);
    background: var(--green-dim);
    color: var(--green);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .scan-btn:hover { background: var(--green-mid); }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .notif-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .notif-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
  .notif-btn.granted { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

  /* ── progress ── */
  .prog-row { padding: 10px 0 4px; }
  .prog-track {
    height: 2px; background: var(--bg3); border-radius: 1px; overflow: hidden; margin-bottom: 6px;
  }
  .prog-fill {
    height: 100%; width: 0%; background: var(--green);
    border-radius: 1px; transition: width 0.3s;
    box-shadow: 0 0 8px var(--green);
  }
  .prog-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }

  /* ── stats ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    padding: 16px 0;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-lbl { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .stat-val { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-val.c-green { color: var(--green); }
  .stat-val.c-red { color: var(--red); }
  .stat-val.c-amber { color: var(--amber); }
  .stat-val.c-text { color: var(--text2); }

  /* ── filter tabs ── */
  .filter-row {
    display: flex; align-items: center; gap: 6px; padding: 12px 0;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .filter-tab {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 4px 12px; border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-tab:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .filter-tab.active.f-all { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .filter-tab.active.f-slong { color: var(--green); border-color: var(--green); background: var(--green-dim); }
  .filter-tab.active.f-long { color: #5fcf9e; border-color: #5fcf9e; background: rgba(95,207,158,0.1); }
  .filter-tab.active.f-sshort { color: var(--red); border-color: var(--red); background: var(--red-dim); }
  .filter-tab.active.f-short { color: #ff8585; border-color: #ff8585; background: rgba(255,133,133,0.08); }
  .filter-tab.active.f-none { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }

  .result-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); margin-left: auto; }

  /* ── table ── */
  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; min-width: 640px; }

  thead th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 500;
    color: var(--text3); text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.8px; text-transform: uppercase;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text2); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--green); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: default;
  }
  tbody tr:hover { background: var(--bg2); }
  tbody tr.new-signal { animation: flash-row 1.5s ease-out; }
  @keyframes flash-row {
    0% { background: rgba(0,214,143,0.15); }
    100% { background: transparent; }
  }

  td {
    padding: 11px 12px; vertical-align: middle; white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  }

  .coin-cell { display: flex; align-items: center; gap: 10px; }
  .coin-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg4); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--text2);
    flex-shrink: 0;
  }
  .coin-name { font-weight: 600; font-size: 13px; color: var(--text); }
  .coin-pair { font-size: 10px; color: var(--text3); }

  .price-cell { font-weight: 500; }

  .pct-up { color: var(--green); }
  .pct-dn { color: var(--red); }

  .sig-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 5px; letter-spacing: 0.3px;
  }
  .sig-badge .dot { width: 5px; height: 5px; border-radius: 50%; }
  .sig-slong { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,214,143,0.3); }
  .sig-long { background: rgba(95,207,158,0.08); color: #5fcf9e; border: 1px solid rgba(95,207,158,0.2); }
  .sig-sshort { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,92,92,0.3); }
  .sig-short { background: rgba(255,133,133,0.06); color: #ff8585; border: 1px solid rgba(255,133,133,0.2); }
  .sig-none { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

  .adx-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .adx-bar-track { width: 60px; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .adx-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .adx-val { font-size: 12px; color: var(--text2); min-width: 28px; }

  .ema-stack { display: flex; flex-direction: column; gap: 1px; }
  .ema-row { font-size: 10px; display: flex; gap: 4px; }
  .ema-lbl { color: var(--text3); min-width: 32px; }
  .ema-v { color: var(--text2); }

  .strength-dots { display: flex; gap: 3px; align-items: center; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg4); }
  .sdot.on-long { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .sdot.on-short { background: var(--red); box-shadow: 0 0 4px var(--red); }

  /* ── empty / loading states ── */
  .empty-state {
    text-align: center; padding: 80px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state .msg { font-size: 15px; margin-bottom: 6px; color: var(--text2); }
  .empty-state .sub { font-size: 12px; font-family: 'IBM Plex Mono', monospace; }

  /* ── toast ── */
  #toast-wrap {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 999; pointer-events: none;
  }
  .toast {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 10px 16px; border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--bg3); color: var(--text);
    pointer-events: auto;
    animation: slide-in 0.25s ease-out;
    max-width: 320px; line-height: 1.5;
  }
  .toast.t-green { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .toast.t-red { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── countdown ── */
  .countdown-wrap { display: flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }
  .countdown-ring {
    width: 20px; height: 20px; position: relative;
  }
  .countdown-ring svg { transform: rotate(-90deg); }
  .countdown-ring circle { fill: none; stroke-width: 2; }
  .ring-bg { stroke: var(--bg4); }
  .ring-fill { stroke: var(--green); transition: stroke-dashoffset 1s linear; }

  /* ── responsive ── */
  @media (max-width: 768px) {
    .col-ema { display: none; }
    .col-adx { display: none; }
    .auto-wrap { flex-basis: 100%; }
  }
  @media (max-width: 520px) {
    .col-strength { display: none; }
  }
</style>
</head>
<body>

<div id="toast-wrap"></div>

<div class="wrap">

  <!-- header -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 14 L6 9 L10 11 L16 4" stroke="#00d68f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="4" r="1.5" fill="#00d68f"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">추세 추종 스캐너</div>
        <div class="logo-sub">BINANCE FUTURES · EMA TREND</div>
      </div>
    </div>
    <div class="header-right">
      <span class="pill" id="last-update-pill">대기 중</span>
      <span class="pill live" id="live-pill" style="display:none">● LIVE</span>
    </div>
  </header>

  <!-- controls -->
  <div class="controls-bar">
    <!-- timeframe -->
    <div class="ctrl-group" id="tf-group">
      <button class="seg-btn tf-btn" data-tf="15m">15m</button>
      <button class="seg-btn tf-btn" data-tf="1h">1h</button>
      <button class="seg-btn tf-btn active" data-tf="4h">4h</button>
      <button class="seg-btn tf-btn" data-tf="1d">1d</button>
    </div>

    <div class="sep"></div>

    <!-- top N -->
    <select id="top-n-select">
      <option value="30">상위 30개</option>
      <option value="50" selected>상위 50개</option>
      <option value="80">상위 80개</option>
      <option value="100">상위 100개</option>
    </select>

    <div class="sep"></div>

    <!-- 자동스캔 -->
    <div class="auto-wrap">
      <span class="auto-label">자동스캔</span>
      <div class="toggle" id="auto-toggle" onclick="toggleAuto()"></div>
      <select id="interval-select">
        <option value="5">5분마다</option>
        <option value="15" selected>15분마다</option>
        <option value="30">30분마다</option>
        <option value="60">1시간마다</option>
      </select>
      <div class="countdown-wrap" id="countdown-wrap" style="display:none">
        <div class="countdown-ring">
          <svg width="20" height="20" viewBox="0 0 20 20">
            <circle class="ring-bg" cx="10" cy="10" r="8" />
            <circle class="ring-fill" id="ring-fill" cx="10" cy="10" r="8"
              stroke-dasharray="50.27" stroke-dashoffset="0"/>
          </svg>
        </div>
        <span id="countdown-txt">—</span>
      </div>

      <div class="sep"></div>

      <!-- 알림 -->
      <button class="notif-btn" id="notif-btn" onclick="requestNotif()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1C5.07 1 3.5 2.57 3.5 4.5V7L2 9h10l-1.5-2V4.5C10.5 2.57 8.93 1 7 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M5.5 9v0.5a1.5 1.5 0 003 0V9" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        알림 허용
      </button>

      <button class="scan-btn" id="scan-btn" onclick="startScan()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 9l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        스캔 시작
      </button>
    </div>
  </div>

  <!-- progress -->
  <div class="prog-row">
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-text" id="prog-text">스캔 버튼을 눌러 시작하세요 — EMA 20/50/200 정배열 + ADX 추세 강도 분석</div>
  </div>

  <!-- stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-lbl">분석 완료</div>
      <div class="stat-val c-text" id="s-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">강한 롱 ↑↑</div>
      <div class="stat-val c-green" id="s-slong">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">롱 신호 ↑</div>
      <div class="stat-val" style="color:#5fcf9e" id="s-long">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">강한 숏 ↓↓</div>
      <div class="stat-val c-red" id="s-sshort">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">숏 신호 ↓</div>
      <div class="stat-val" style="color:#ff8585" id="s-short">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">횡보/중립</div>
      <div class="stat-val c-amber" id="s-none">—</div>
    </div>
  </div>

  <!-- filter tabs -->
  <div class="filter-row">
    <button class="filter-tab active f-all" data-f="all">전체</button>
    <button class="filter-tab f-slong" data-f="strong-long">강한 롱</button>
    <button class="filter-tab f-long" data-f="long">롱</button>
    <button class="filter-tab f-sshort" data-f="strong-short">강한 숏</button>
    <button class="filter-tab f-short" data-f="short">숏</button>
    <button class="filter-tab f-none" data-f="none">횡보</button>
    <span class="result-count" id="result-count"></span>
  </div>

  <!-- table -->
  <div class="table-wrap">
    <div id="table-body">
      <div class="empty-state">
        <div class="icon">⟳</div>
        <div class="msg">스캔 대기 중</div>
        <div class="sub">스캔 버튼을 눌러 추세 신호를 분석합니다</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── state ──────────────────────────────────────────
let allResults = [];
let currentFilter = 'all';
let sortKey = 'signal';
let sortDir = 1;
let scanning = false;
let autoInterval = null;
let autoOn = false;
let countdownTimer = null;
let countdownSec = 0;
let countdownTotal = 0;
let notifGranted = Notification.permission === 'granted';
let prevSignals = {};
let selectedTf = '4h';

// ── EMA & ADX ─────────────────────────────────────
function ema(data, period) {
  const k = 2 / (period + 1);
  let e = data[0];
  const result = [e];
  for (let i = 1; i < data.length; i++) {
    e = data[i] * k + e * (1 - k);
    result.push(e);
  }
  return result;
}

function calcADX(highs, lows, closes, period = 14) {
  const len = closes.length;
  if (len < period + 5) return 0;
  const plusDM = [], minusDM = [], tr = [];
  for (let i = 1; i < len; i++) {
    const up = highs[i] - highs[i-1];
    const dn = lows[i-1] - lows[i];
    plusDM.push(up > dn && up > 0 ? up : 0);
    minusDM.push(dn > up && dn > 0 ? dn : 0);
    tr.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
  }
  function wilder(arr, p) {
    let s = arr.slice(0, p).reduce((a,b)=>a+b,0);
    const r = [s];
    for (let i = p; i < arr.length; i++) { s = s - s/p + arr[i]; r.push(s); }
    return r;
  }
  const sTR = wilder(tr, period);
  const sPDM = wilder(plusDM, period);
  const sMDM = wilder(minusDM, period);
  const DIs = sPDM.map((v,i) => sTR[i] ? 100*v/sTR[i] : 0);
  const DIm = sMDM.map((v,i) => sTR[i] ? 100*v/sTR[i] : 0);
  const DX = DIs.map((v,i) => (v+DIm[i]) ? 100*Math.abs(v-DIm[i])/(v+DIm[i]) : 0);
  const adxArr = ema(DX, period);
  return adxArr[adxArr.length-1];
}

function getSignal(closes, highs, lows) {
  const len = closes.length;
  if (len < 210) return null;
  const e20a = ema(closes, 20), e50a = ema(closes, 50), e200a = ema(closes, 200);
  const e20 = e20a[len-1], e50 = e50a[len-1], e200 = e200a[len-1];
  const price = closes[len-1];
  const adx = calcADX(highs, lows, closes, 14);
  const bullAlign = e20 > e50 && e50 > e200;
  const bearAlign = e20 < e50 && e50 < e200;
  const aboveAll = price > e20 && price > e50 && price > e200;
  const belowAll = price < e20 && price < e50 && price < e200;
  const strongTrend = adx > 25;
  const trending = adx > 20;
  let signal = 'none', strength = 0;
  if (bullAlign && aboveAll && strongTrend) { signal = 'strong-long'; strength = 3; }
  else if (bullAlign && trending) { signal = 'long'; strength = 2; }
  else if (bullAlign) { signal = 'long'; strength = 1; }
  else if (bearAlign && belowAll && strongTrend) { signal = 'strong-short'; strength = 3; }
  else if (bearAlign && trending) { signal = 'short'; strength = 2; }
  else if (bearAlign) { signal = 'short'; strength = 1; }
  const pct24 = ((closes[len-1] - closes[len-25]) / closes[len-25]) * 100;
  return { e20, e50, e200, price, adx, signal, strength, pct24 };
}

// ── API ──────────────────────────────────────────
async function getTopSymbols(n) {
  const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
  const data = await res.json();
  return data
    .filter(d => d.symbol.endsWith('USDT') && !d.symbol.includes('_'))
    .sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
    .slice(0, n)
    .map(d => d.symbol);
}

async function fetchKlines(symbol, tf) {
  const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${tf}&limit=300`);
  const data = await res.json();
  return {
    closes: data.map(d => parseFloat(d[4])),
    highs: data.map(d => parseFloat(d[2])),
    lows: data.map(d => parseFloat(d[3]))
  };
}

// ── scan ──────────────────────────────────────────
async function startScan(silent = false) {
  if (scanning) return;
  scanning = true;
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="animation:spin 1s linear infinite"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="20" stroke-dashoffset="5"/></svg> 스캔 중...`;

  if (!document.querySelector('style#spin-style')) {
    const s = document.createElement('style');
    s.id = 'spin-style';
    s.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }

  const n = parseInt(document.getElementById('top-n-select').value);
  const tf = selectedTf;
  allResults = [];
  let done = 0;

  try {
    setStatus('거래량 상위 코인 목록 불러오는 중...');
    const symbols = await getTopSymbols(n);
    for (const sym of symbols) {
      setStatus(`분석 중: ${sym}  (${done+1} / ${symbols.length})`);
      setProgress(done / symbols.length * 100);
      try {
        const { closes, highs, lows } = await fetchKlines(sym, tf);
        const r = getSignal(closes, highs, lows);
        if (r) {
          const prev = prevSignals[sym];
          const isNew = prev && prev !== r.signal && (r.signal === 'strong-long' || r.signal === 'strong-short');
          allResults.push({ symbol: sym, ...r, isNew });
          if (isNew) fireNotification(sym, r.signal);
          prevSignals[sym] = r.signal;
        }
      } catch(e) {}
      done++;
      renderTable();
      updateStats();
      await sleep(60);
    }
    setProgress(100);
    const now = new Date();
    const ts = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('last-update-pill').textContent = `업데이트: ${ts}`;
    setStatus(`스캔 완료 — ${done}개 코인 분석 완료 (${tf} 기준)`);
    if (!silent) showToast(`${done}개 코인 스캔 완료`, 'green');
  } catch(e) {
    setStatus('오류 발생. 네트워크를 확인하고 다시 시도하세요.');
    showToast('스캔 중 오류가 발생했습니다', 'red');
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M9 9l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> 재스캔`;
  scanning = false;
}

// ── auto scan ─────────────────────────────────────
function toggleAuto() {
  autoOn = !autoOn;
  const tog = document.getElementById('auto-toggle');
  const livePill = document.getElementById('live-pill');
  const cdWrap = document.getElementById('countdown-wrap');
  if (autoOn) {
    tog.classList.add('on');
    livePill.style.display = '';
    cdWrap.style.display = '';
    scheduleNext();
    showToast('자동 스캔이 시작되었습니다', 'green');
  } else {
    tog.classList.remove('on');
    livePill.style.display = 'none';
    cdWrap.style.display = 'none';
    clearInterval(autoInterval);
    clearInterval(countdownTimer);
    autoInterval = null;
    showToast('자동 스캔이 중지되었습니다');
  }
}

function scheduleNext() {
  clearInterval(autoInterval);
  clearInterval(countdownTimer);
  const mins = parseInt(document.getElementById('interval-select').value);
  countdownTotal = mins * 60;
  countdownSec = countdownTotal;
  updateCountdown();
  countdownTimer = setInterval(() => {
    countdownSec--;
    if (countdownSec <= 0) countdownSec = countdownTotal;
    updateCountdown();
  }, 1000);
  autoInterval = setInterval(() => {
    startScan(true);
    countdownSec = countdownTotal;
  }, mins * 60 * 1000);
}

function updateCountdown() {
  const m = Math.floor(countdownSec / 60);
  const s = countdownSec % 60;
  document.getElementById('countdown-txt').textContent = `${pad(m)}:${pad(s)}`;
  const circ = 2 * Math.PI * 8;
  const offset = circ * (1 - countdownSec / countdownTotal);
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
}

// ── notifications ─────────────────────────────────
async function requestNotif() {
  if (!('Notification' in window)) { showToast('이 브라우저는 알림을 지원하지 않습니다'); return; }
  const perm = await Notification.requestPermission();
  notifGranted = perm === 'granted';
  const btn = document.getElementById('notif-btn');
  if (notifGranted) {
    btn.classList.add('granted');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5.5L5.5 9 12 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 알림 허용됨`;
    showToast('브라우저 알림이 허용되었습니다', 'green');
  } else {
    showToast('알림 권한이 거부되었습니다. 브라우저 설정에서 허용해주세요');
  }
}

function fireNotification(symbol, signal) {
  if (!notifGranted) return;
  const isLong = signal.includes('long');
  const title = `📈 ${symbol} 강한 ${isLong ? '롱' : '숏'} 신호 발생`;
  const body = `EMA 정${isLong?'':'역'}배열 + ADX 25 이상 — ${selectedTf} 기준`;
  new Notification(title, { body, icon: '' });
}

// ── render ────────────────────────────────────────
const SIGNAL_ORDER = { 'strong-long':0, 'long':1, 'strong-short':2, 'short':3, 'none':4 };

function renderTable() {
  let data = [...allResults];
  if (currentFilter !== 'all') data = data.filter(r => r.signal === currentFilter);
  data.sort((a,b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (sortKey === 'signal') { va = SIGNAL_ORDER[a.signal]??4; vb = SIGNAL_ORDER[b.signal]??4; }
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  document.getElementById('result-count').textContent = `${data.length}개 코인`;

  if (data.length === 0) {
    document.getElementById('table-body').innerHTML = `
      <div class="empty-state">
        <div class="icon">○</div>
        <div class="msg">신호 없음</div>
        <div class="sub">해당 조건의 코인이 없습니다</div>
      </div>`;
    return;
  }

  const sortIcon = (key) => {
    if (sortKey !== key) return `<span class="sort-icon">↕</span>`;
    return `<span class="sort-icon">${sortDir === 1 ? '↑' : '↓'}</span>`;
  };

  const rows = data.map(r => {
    const [sigLabel, sigCls] = sigInfo(r.signal);
    const dotCls = r.signal.includes('long') ? 'on-long' : r.signal.includes('short') ? 'on-short' : '';
    const adxPct = Math.min(r.adx / 50 * 100, 100).toFixed(0);
    const adxColor = r.adx >= 25 ? 'var(--green)' : r.adx >= 20 ? 'var(--amber)' : 'var(--text3)';
    const pctCls = r.pct24 >= 0 ? 'pct-up' : 'pct-dn';
    const pctStr = (r.pct24 >= 0 ? '+' : '') + r.pct24.toFixed(2) + '%';
    const initials = r.symbol.replace('USDT','').slice(0,3);
    const newRow = r.isNew ? ' new-signal' : '';
    return `<tr class="${newRow}">
      <td>
        <div class="coin-cell">
          <div class="coin-icon">${initials}</div>
          <div>
            <div class="coin-name">${r.symbol.replace('USDT','')}</div>
            <div class="coin-pair">USDT 선물</div>
          </div>
        </div>
      </td>
      <td class="price-cell">${fmtPrice(r.price)}</td>
      <td class="${pctCls}">${pctStr}</td>
      <td><span class="sig-badge ${sigCls}"><span class="dot" style="background:currentColor"></span>${sigLabel}</span></td>
      <td>
        <div class="strength-dots">
          ${[0,1,2].map(i=>`<div class="sdot ${i<r.strength ? dotCls : ''}"></div>`).join('')}
        </div>
      </td>
      <td class="col-adx">
        <div class="adx-bar-wrap">
          <div class="adx-bar-track"><div class="adx-bar-fill" style="width:${adxPct}%;background:${adxColor}"></div></div>
          <span class="adx-val" style="color:${adxColor}">${r.adx.toFixed(1)}</span>
        </div>
      </td>
      <td class="col-ema">
        <div class="ema-stack">
          <div class="ema-row"><span class="ema-lbl">E20</span><span class="ema-v">${fmtPrice(r.e20)}</span></div>
          <div class="ema-row"><span class="ema-lbl">E50</span><span class="ema-v">${fmtPrice(r.e50)}</span></div>
          <div class="ema-row"><span class="ema-lbl">E200</span><span class="ema-v">${fmtPrice(r.e200)}</span></div>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('table-body').innerHTML = `
    <table>
      <thead>
        <tr>
          <th onclick="setSort('symbol')" class="${sortKey==='symbol'?'sorted':''}">코인 ${sortIcon('symbol')}</th>
          <th onclick="setSort('price')" class="${sortKey==='price'?'sorted':''}">현재가 ${sortIcon('price')}</th>
          <th onclick="setSort('pct24')" class="${sortKey==='pct24'?'sorted':''}">24h ${sortIcon('pct24')}</th>
          <th onclick="setSort('signal')" class="${sortKey==='signal'?'sorted':''}">신호 ${sortIcon('signal')}</th>
          <th>강도</th>
          <th class="col-adx" onclick="setSort('adx')" class="${sortKey==='adx'?'sorted':''}">ADX ${sortIcon('adx')}</th>
          <th class="col-ema">EMA 20 / 50 / 200</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderTable();
}

// ── ui helpers ────────────────────────────────────
function sigInfo(sig) {
  const map = {
    'strong-long': ['강한 롱 ↑↑', 'sig-slong'],
    'long':        ['롱 ↑',       'sig-long'],
    'strong-short':['강한 숏 ↓↓', 'sig-sshort'],
    'short':       ['숏 ↓',       'sig-short'],
    'none':        ['횡보',        'sig-none'],
  };
  return map[sig] || ['—', 'sig-none'];
}

function fmtPrice(p) {
  if (p >= 10000) return p.toLocaleString('en', {maximumFractionDigits:1});
  if (p >= 1000) return p.toLocaleString('en', {maximumFractionDigits:2});
  if (p >= 1) return p.toFixed(4);
  return p.toFixed(6);
}

function setProgress(pct) { document.getElementById('prog-fill').style.width = pct.toFixed(1) + '%'; }
function setStatus(msg) { document.getElementById('prog-text').textContent = msg; }

function updateStats() {
  const r = allResults;
  document.getElementById('s-total').textContent = r.length;
  document.getElementById('s-slong').textContent = r.filter(x=>x.signal==='strong-long').length;
  document.getElementById('s-long').textContent = r.filter(x=>x.signal==='long').length;
  document.getElementById('s-sshort').textContent = r.filter(x=>x.signal==='strong-short').length;
  document.getElementById('s-short').textContent = r.filter(x=>x.signal==='short').length;
  document.getElementById('s-none').textContent = r.filter(x=>x.signal==='none').length;
}

function showToast(msg, type = '') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ` t-${type}` : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }, 3000);
}

function pad(n) { return String(n).padStart(2,'0'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── event listeners ───────────────────────────────
document.querySelectorAll('#tf-group .tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#tf-group .tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTf = btn.dataset.tf;
  });
});

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.f;
    renderTable();
  });
});

document.getElementById('interval-select').addEventListener('change', () => {
  if (autoOn) scheduleNext();
});

// 알림 권한 초기 상태 반영
if (notifGranted) {
  const btn = document.getElementById('notif-btn');
  btn.classList.add('granted');
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5.5L5.5 9 12 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 알림 허용됨`;
}
</script>
